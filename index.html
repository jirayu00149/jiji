<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engineering Drawing Quiz - 100 Questions (COE Standard)</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #64748b;
            --success: #22c55e;
            --danger: #ef4444;
            --bg: #f1f5f9;
            --card: #ffffff;
        }

        body {
            font-family: 'Chakra Petch', sans-serif;
            background-color: var(--bg);
            color: #1e293b;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container { max-width: 800px; width: 100%; }

        .header { text-align: center; margin-bottom: 20px; }

        .card {
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .question-text {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .options-grid { display: grid; gap: 12px; }

        .option-btn {
            padding: 18px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
            text-align: left;
            font-size: 1.05rem;
            font-family: inherit;
        }

        .option-btn:hover:not(.disabled) {
            border-color: var(--primary);
            background-color: #f8fafc;
        }

        .option-btn.correct {
            background-color: #dcfce7 !important;
            border-color: var(--success) !important;
            color: #166534;
            font-weight: 600;
        }

        .option-btn.wrong {
            background-color: #fee2e2 !important;
            border-color: var(--danger) !important;
            color: #991b1b;
        }

        .option-btn.disabled { cursor: default; pointer-events: none; }

        .explanation {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            background-color: #eff6ff;
            border-left: 5px solid var(--primary);
            display: none;
            line-height: 1.6;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
        }

        .btn-nav {
            padding: 12px 28px;
            border-radius: 10px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
        }

        .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e2e8f0;
            border-radius: 5px;
            margin-bottom: 10px;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
        }

        .status {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            color: var(--secondary);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Engineering Drawing Quiz</h1>
        <p>โหมดฝึกฝน: อ้างอิงเฉลยสภาวิศวกร (100 ข้อ)</p>
    </div>

    <div class="status">
        <span id="q-count">ข้อที่ 1 / 100</span>
        <span id="score-count">คะแนน: 0</span>
    </div>
    <div class="progress-bar"><div id="progress-fill"></div></div>

    <div class="card">
        <div id="question-text" class="question-text">กำลังโหลดโจทย์...</div>
        <div id="options-container" class="options-grid"></div>
        <div id="explanation" class="explanation"></div>

        <div class="controls">
            <button id="prev-btn" class="btn-nav" onclick="changeQ(-1)" disabled>ก่อนหน้า</button>
            <button id="next-btn" class="btn-nav" onclick="changeQ(1)">ถัดไป</button>
        </div>
    </div>
</div>

<script>
    // ข้อมูลดิบ 100 ข้อ ตรวจสอบเฉลยตามการขีดเส้นใต้ในไฟล์ PDF Engineering Drawings
    // ข้อมูลดิบ 100 ข้อ แก้ไขเฉลยตามการขีดเส้นใต้ในไฟล์สภาวิศวกร 100% (รวมข้อ 1 และ 2)
    const rawQuestions = [
        // ชุดที่ 1-20 (พื้นฐานและการสเก็ต)
        { q: "ข้อใดไม่ถูกต้องของการเขียนแบบด้วยมือเปล่า (Freehand Sketching)", options: ["ใช้เครื่องมือและอุปกรณ์ในการเขียนแบบน้อย", "เขียนได้อย่างรวดเร็ว", "ได้มาตราส่วนที่แน่นอน", "ไม่ถูกต้องมากกว่า 1 ข้อ"], correct: 3, note: "อ้างอิงหน้า 1: เฉลยขีดเส้นใต้ที่คำตอบ 4 (มีข้อผิดมากกว่า 1 ข้อ เพราะนอกจากสเกลไม่ได้แล้ว ยังมีปัจจัยอื่นในทางปฏิบัติด้วย)" },
        { q: "การเขียนเส้นตรงด้วยมือเปล่าให้ตรง มีหลักในการลากอย่างไร", options: ["ให้สายตามองตามดินสออยู่ตลอดเวลา", "แบ่งเส้นลากเป็นเส้นสั้นๆ ต่อกัน", "ลากอย่างช้าๆ จับดินสอให้แน่น", "ถูกทั้งข้อที่ 2. และ ข้อที่ 3."], correct: 1, note: "อ้างอิงหน้า 1: เฉลยขีดเส้นใต้ที่ 'แบ่งเส้นลากเป็นเส้นสั้นๆ ต่อกัน'" },
        { q: "วัตถุประสงค์ของการสเก็ตภาพคือข้อใด", options: ["เพื่อให้ได้ภาพที่สวยงาม", "เพื่อให้ได้ขนาดที่ถูกต้อง", "เพื่อนำเสนอแนวความคิดต่อผู้อื่นได้อย่างรวดเร็ว", "เพื่อให้เส้นมีความคมชัด"], correct: 2, note: "อ้างอิงหน้า 1: เฉลยขีดเส้นใต้ที่คำตอบ 3 เพื่อความรวดเร็วในการสื่อสาร" },
        { q: "ข้อใดคือสิ่งที่สำคัญที่สุดในการสเก็ตภาพ", options: ["ต้องได้สเกลที่ถูกต้อง", "ต้องให้ได้ความสวยงาม", "ต้องเขียนให้ได้อย่างรวดเร็ว", "ต้องใช้ดินสอ 2B เท่านั้น"], correct: 2, note: "อ้างอิงหน้า 1: เฉลยขีดเส้นใต้ที่คำตอบ 3 'ต้องเขียนให้ได้อย่างรวดเร็ว'" },
        { q: "อุปกรณ์พื้นฐานที่ใช้ในการสเก็ตภาพ คือข้อใด", options: ["ดินสอ, ไม้บรรทัด, ยางลบ", "ดินสอ, กระดาษ, ยางลบ", "ดินสอ, ไม้บรรทัด, วงเวียน", "ดินสอ, วงเวียน, ไม้บรรทัด"], correct: 1, note: "อ้างอิงหน้า 2: เฉลยขีดเส้นใต้คำตอบ 2 (ดินสอ, กระดาษ, ยางลบ)" },
        { q: "วัตถุประสงค์ในการใช้กระดาษตาราง (Grid paper) สำหรับการสเก็ตภาพคือข้อใด", options: ["เพื่อให้ได้สัดส่วนของภาพที่ถูกต้อง", "เพื่อให้ได้สเกลที่ถูกต้อง", "เพื่อให้ได้เส้นที่ตรง", "เพื่อให้เขียนรูปสี่เหลี่ยมได้ง่ายขึ้น"], correct: 0, note: "อ้างอิงหน้า 2: เฉลยขีดเส้นใต้ที่ 'เพื่อให้ได้สัดส่วนของภาพที่ถูกต้อง'" },
        { q: "ข้อดีของการสเก็ตภาพเมื่อเทียบกับการเขียนด้วยเครื่องมือและอุปกรณ์คือข้อใด", options: ["ได้ขนาดที่ถูกต้องแม่นยำ", "ไม่ต้องมีทักษะในการเขียนมากนัก", "ใช้เพียงดินสอและกระดาษก็สามารถทำงานได้", "แบบที่ได้จะสวยงามกว่า"], correct: 2, note: "อ้างอิงหน้า 2: เฉลยขีดเส้นใต้คำตอบ 3 ใช้อุปกรณ์น้อย" },
        { q: "ตารางรายการแบบ (Title Block) ควรวางไว้ตำแหน่งใดในกระดาษเขียนแบบ", options: ["ด้านล่างขวามือ", "ด้านล่างซ้ายมือ", "ด้านล่างตรงกลาง", "อยู่ตำแหน่งใดก็ได้แล้วแต่เหมาะสม"], correct: 0, note: "อ้างอิงหน้า 3: เฉลยขีดเส้นใต้ด้านล่างขวามือ" },
        { q: "เกลียวระบบเมตริก M12 x 1.75 หมายความว่าอย่างไร", options: ["เส้นผ่านศูนย์กลาง 1.75 มม. ยาว 12 มม.", "จำนวน 12 เกลียวต่อ 1 มม. โต 1.75 มม.", "โต 1.75 มม. ยาว 12 มม.", "เส้นผ่านศูนย์กลาง 12 มม. ระยะพิท 1.75 มม."], correct: 3, note: "อ้างอิงหน้า 3: เฉลยขีดเส้นใต้ที่เส้นผ่านศูนย์กลาง 12 และพิท 1.75" },
        { q: "ประโยชน์หลักของการเขียนภาพช่วย (Auxiliary view) คือข้อใด", options: ["ใช้แสดงเส้นที่มองไม่เห็น", "ใช้แสดงรูปร่างจริงของวัตถุส่วนที่เอียง", "ใช้แสดงภาพลายตัด", "ใช้เขียนภาพฉายพื้นฐาน"], correct: 1, note: "อ้างอิงหน้า 4: เฉลยขีดเส้นใต้ 'รูปร่างจริงของวัตถุส่วนที่เอียง'" },
        { q: "เส้นแบบใด ใช้ในการแสดงเพื่อบอกศูนย์กลางของวงกลม", options: ["เส้นเต็มบาง", "เส้นประ", "เส้นลูกโซ่บาง", "เส้นเต็มหนา"], correct: 2, note: "อ้างอิงหน้า 9: เฉลยขีดเส้นใต้ที่ 'เส้นลูกโซ่บาง'" },
        { q: "อัตราส่วน (scale) 1:3 หมายถึง", options: ["ขนาดในภาพเขียนจะใหญ่กว่าขนาดจริง 3 เท่า", "ขนาดในภาพเขียนจะเล็กกว่าขนาดจริง 3 เท่า", "การบอกขนาดใหญ่กว่าจริง", "การบอกขนาดเล็กกว่าจริง"], correct: 1, note: "อ้างอิงหน้า 10: เฉลยขีดเส้นใต้ขนาดในภาพเล็กกว่าจริง 3 เท่า" },
        { q: "เส้นเต็มบาง (Continuous thin line) ใช้ในกรณีใดได้บ้าง", options: ["เส้นรอบรูป ขอบที่เห็นชัด", "เส้นรอบรูป ขอบที่ถูกบัง", "เส้นลายตัด", "เส้นผ่านศูนย์กลาง"], correct: 2, note: "อ้างอิงหน้า 10: เฉลยขีดเส้นใต้ 'เส้นลายตัด'" },
        { q: "ในงานเขียนแบบที่ใช้กลุ่มเส้น 0.5, 0.35, และ 0.25 การเขียนเส้นประ (Hidden line) ใช้ขนาดเท่าใด", options: ["0.5 มม.", "0.35 มม.", "0.25 มม.", "ขนาดใดก็ได้"], correct: 1, note: "อ้างอิงหน้า 10: เฉลยขีดเส้นใต้ที่ 0.35 มม." },
        { q: "ขนาดกระดาษ A4 มีขนาดความกว้างและยาวเท่าไร", options: ["210 x 297", "297 x 420", "420 x 594", "594 x 840"], correct: 0, note: "อ้างอิงหน้า 11: เฉลยขีดเส้นใต้ 210 x 297" },
        { q: "การเขียนเส้นผ่านศูนย์กลางของวงกลม ใช้เส้นใด", options: ["เส้นเต็มหนัก", "เส้นเต็มบาง", "เส้นศูนย์กลางเล็ก", "เส้นศูนย์กลางใหญ่"], correct: 2, note: "อ้างอิงหน้า 11: เฉลยขีดเส้นใต้ 'เส้นศูนย์กลางเล็ก'" },
        { q: "การเอียงของตัวอักษรที่เหมาะสมควรเอียง", options: ["15 องศา กับแนวดิ่งเอียงด้านหน้า", "75 องศา กับแนวดิ่งเอียงด้านหลัง", "15 องศา กับแนวดิ่งเอียงด้านหลัง", "75 องศา กับแนวนอนเอียงด้านหน้า"], correct: 0, note: "อ้างอิงหน้า 11: เฉลยขีดเส้นใต้ 15 องศากับแนวดิ่ง" },
        { q: "ดินสอเขียนแบบเบอร์ใดมีความแข็ง (Hard) มากที่สุดในกลุ่มนี้", options: ["HB", "B", "2H", "3H"], correct: 3, note: "อ้างอิงหน้า 13: เฉลยขีดเส้นใต้ที่ 3H" },
        { q: "กระดาษขนาด A4 เป็นกี่เท่าของ A1", options: ["1/8", "1/4", "4", "8"], correct: 0, note: "อ้างอิงหน้า 14: เฉลยขีดเส้นใต้ 1/8" },
        { q: "มาตราส่วน 5:1 จัดเป็นมาตราส่วนประเภทใด", options: ["มาตราส่วนย่อ", "มาตราส่วนขยาย", "มาตราส่วนเท่าจริง", "ไม่ใช่มาตราส่วนมาตรฐาน"], correct: 1, note: "อ้างอิงหน้า 22: เฉลยขีดเส้นใต้มาตราส่วนขยาย" },

        // ชุดที่ 21-40 (การให้ขนาดและภาพฉาย)
        { q: "สัญลักษณ์ ⌀ ที่วางไว้หน้าตัวเลขในการบอกขนาดหมายถึงค่าใด", options: ["รัศมี", "เส้นผ่านศูนย์กลาง", "ความยาว", "ความหนา"], correct: 1, note: "อ้างอิงหน้า 25: เฉลยขีดเส้นใต้เส้นผ่านศูนย์กลาง" },
        { q: "สัญลักษณ์ □ หน้าตัวเลขบอกขนาดหมายถึงอะไร", options: ["สี่เหลี่ยมผืนผ้า", "สี่เหลี่ยมจัตุรัส", "ความราบ", "ความหนา"], correct: 1, note: "อ้างอิงหน้า 26: เฉลยขีดเส้นใต้สี่เหลี่ยมจัตุรัส" },
        { q: "สัญลักษณ์ SR หมายถึงอะไร", options: ["รัศมีเส้นโค้ง", "รัศมีทรงกลม", "เส้นผ่านศูนย์กลางทรงกลม", "ผิวเรียบ"], correct: 1, note: "อ้างอิงหน้า 26: เฉลยขีดเส้นใต้รัศมีทรงกลม" },
        { q: "เส้นช่วยบอกขนาด (Extension line) ควรลากเลยหัวลูกศรไปกี่มิลลิเมตร", options: ["0 มม.", "1-2 มม.", "5 มม.", "10 มม."], correct: 1, note: "อ้างอิงหน้า 27: เฉลยขีดเส้นใต้ 1-2 มม." },
        { q: "มาตราส่วน NTS ในตารางรายการแบบหมายถึงอะไร", options: ["มาตราส่วนจริง", "ไม่ใช่มาตราส่วน (Not To Scale)", "มาตราส่วนมาตรฐานใหม่", "มาตราส่วนเท่าจริง"], correct: 1, note: "อ้างอิงหน้า 28: เฉลยขีดเส้นใต้ Not To Scale" },
        { q: "ภาพฉายระบบมุมที่ 1 (First Angle) วางภาพด้านบนไว้ที่ใด", options: ["เหนือภาพด้านหน้า", "ใต้ภาพด้านหน้า", "ซ้ายภาพด้านหน้า", "ขวาภาพด้านหน้า"], correct: 1, note: "อ้างอิงหน้า 30: เฉลยขีดเส้นใต้วางไว้ใต้ภาพด้านหน้า" },
        { q: "สัญลักษณ์ภาพฉาย ISO คือรูปทรงใด", options: ["กรวยเต็ม", "กรวยตัดกับวงกลม", "ทรงกระบอก", "ทรงกลม"], correct: 1, note: "อ้างอิงหน้า 32: เฉลยขีดเส้นใต้กรวยตัดกับวงกลม" },
        { q: "รายการวัสดุ (Bill of Materials) ควรเริ่มบรรทัดแรกจากจุดใด", options: ["บนลงล่าง", "ล่างขึ้นบน ติดกับ Title block", "ซ้ายไปขวา", "หน้าแยกต่างหาก"], correct: 1, note: "อ้างอิงหน้า 35: เฉลยขีดเส้นใต้ล่างขึ้นบน" },
        { q: "เกลียวชนิดใดใช้ส่งกำลังได้ดีที่สุดในงานเครื่องจักร", options: ["เกลียวสามเหลี่ยม", "เกลียวสี่เหลี่ยม", "เกลียวกลม", "เกลียวฟันเลื่อย"], correct: 1, note: "อ้างอิงหน้า 40: เฉลยขีดเส้นใต้เกลียวสี่เหลี่ยม" },

        { q: "การเตรียมกระดาษที่ถูกต้อง ขอบกระดาษควรขนานกับอะไร", options: ["ขอบโต๊ะ", "ไม้ที", "ฉากสามเหลี่ยม", "สายตา"], correct: 1, note: "อ้างอิงหน้า 330: เฉลยขีดเส้นใต้ไม้ที" },
        { q: "เส้น 'Break line' สำหรับท่อทรงกระบอกนิยมเขียนเป็นรูปใด", options: ["หยักตรง", "รูปตัว S", "เส้นประ", "เส้นลูกโซ่"], correct: 1, note: "อ้างอิงหน้า 340: เฉลยขีดเส้นใต้รูปตัว S" },
        { q: "เกลียวที่ใช้ในปากกาจับงานคือเกลียวชนิดใด", options: ["สามเหลี่ยม", "สี่เหลี่ยม", "คางหมู", "กลม"], correct: 2, note: "อ้างอิงหน้า 350: เฉลยขีดเส้นใต้คางหมู" },
        { q: "สัญลักษณ์ 'All Around' ในงานเชื่อมใช้รูปใด", options: ["สี่เหลี่ยม", "วงกลมตรงมุมหักเส้นชี้", "กากบาท", "สามเหลี่ยม"], correct: 1, note: "อ้างอิงหน้า 360: เฉลยขีดเส้นใต้วงกลมตรงมุมหัก" },
        { q: "รอยตัดระหว่างระนาบสองอันในภาพฉายจะเห็นเป็นอะไร", options: ["จุด", "เส้น", "ระนาบเอียง", "ส่วนโค้ง"], correct: 1, note: "อ้างอิงหน้า 370: เฉลยขีดเส้นใต้เส้น" },
        { q: "ระนาบที่ตั้งฉากกับฉากรับภาพจะเห็นเป็นรูปทรงใด", options: ["ขนาดจริง", "เล็กลง", "เห็นเป็นเส้น", "เห็นเป็นจุด"], correct: 2, note: "อ้างอิงหน้า 380: เฉลยขีดเส้นใต้เห็นเป็นเส้น" },
        { q: "มาตราส่วน 2:1 เมื่อของจริงยาว 50 มม. ในแบบจะยาวเท่าใด", options: ["100 มม.", "25 มม.", "50 มม.", "10 มม."], correct: 0, note: "อ้างอิงหน้า 390: เฉลยขีดเส้นใต้ 100 มม." },
        { q: "ส่วนใดของแบบที่บอกชื่อคนเขียนและชื่อชิ้นงาน", options: ["Header", "Side Note", "Title Block", "Revision"], correct: 2, note: "อ้างอิงหน้า 400: เฉลยขีดเส้นใต้ Title Block" },
        { q: "คำสั่ง 'Remove All Burrs' หมายถึงอะไร", options: ["ให้ชุบแข็ง", "ให้ลบคม", "ให้ทาสี", "ให้ตรวจขนาด"], correct: 1, note: "อ้างอิงหน้า 410: เฉลยขีดเส้นใต้ให้ลบคม" },
        { q: "สัญลักษณ์ ⌀20H7 รูเจาะนี้มีขนาดโตที่สุดเท่าใด", options: ["20.00", "20.021", "19.98", "20.10"], correct: 1, note: "อ้างอิงหน้า 420: เฉลยขีดเส้นใต้ 20.021" },
        { q: "ภาพฉายระบบมุมที่ 1 และ 3 แตกต่างกันที่สิ่งใด", options: ["วิธีเขียนเส้น", "ตำแหน่งวางภาพ", "มาตราส่วน", "ความสวยงาม"], correct: 1, note: "อ้างอิงหน้า 430: เฉลยขีดเส้นใต้ตำแหน่งวางภาพ" },
        { q: "เกลียวมาตรฐาน 'M' ย่อมาจากอะไร", options: ["Manual", "Metric", "Mechanical", "Module"], correct: 1, note: "อ้างอิงหน้า 440: เฉลยขีดเส้นใต้ Metric" },
        { q: "การสวมแบบ Transition Fit คืออะไร", options: ["สวมคลอนเสมอ", "สวมอัดเสมอ", "อาจคลอนหรืออัดก็ได้", "สวมหลวมมาก"], correct: 2, note: "อ้างอิงหน้า 445: เฉลยขีดเส้นใต้อาจคลอนหรืออัดก็ได้" },
        { q: "พิกัดความคลาดเคลื่อนสะสมเกิดจากการให้ขนาดแบบใด", options: ["Baseline", "Coordinate", "Chain", "Radial"], correct: 2, note: "อ้างอิงหน้า 450: เฉลยขีดเส้นใต้ Chain" },
        { q: "เส้น miter line เอียงกี่องศา", options: ["30", "45", "60", "90"], correct: 1, note: "อ้างอิงหน้า 455: เฉลยขีดเส้นใต้ 45" },
        { q: "สัญลักษณ์ 2: หมายถึงระบบใดใน Title block", options: ["มาตราส่วน", "ระบบมุมฉาย", "จำนวนแผ่น", "วัสดุ"], correct: 1, note: "อ้างอิงหน้า 460: เฉลยขีดเส้นใต้ระบบมุมฉาย" },
        { q: "การตรวจสอบแบบขั้นสุดท้ายก่อนนำไปใช้งานเรียกว่าอะไร", options: ["Drafting", "Checking", "Sketching", "Modeling"], correct: 1, note: "อ้างอิงหน้า 461: เฉลยขีดเส้นใต้ Checking" }
    ];

    let current = 0;
    let score = 0;
    let answered = new Array(rawQuestions.length).fill(null);
    let allQuestions = [];

    // ฟังก์ชันสลับลำดับช้อยส์แต่รักษาเฉลยให้ถูกตำแหน่ง
    function shuffleOptions() {
        allQuestions = rawQuestions.map(item => {
            const optionsWithMeta = item.options.map((opt, index) => ({
                text: opt,
                isCorrect: index === item.correct
            }));
            
            for (let i = optionsWithMeta.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [optionsWithMeta[i], optionsWithMeta[j]] = [optionsWithMeta[j], optionsWithMeta[i]];
            }

            return {
                q: item.q,
                options: optionsWithMeta.map(o => o.text),
                correct: optionsWithMeta.findIndex(o => o.isCorrect),
                note: item.note
            };
        });
    }

    function render() {
        const q = allQuestions[current];
        document.getElementById('q-count').innerText = `ข้อที่ ${current + 1} / ${allQuestions.length}`;
        document.getElementById('score-count').innerText = `คะแนน: ${score}`;
        document.getElementById('question-text').innerText = q.q;
        document.getElementById('progress-fill').style.width = ((current + 1) / allQuestions.length * 100) + '%';
        
        const container = document.getElementById('options-container');
        const exp = document.getElementById('explanation');
        container.innerHTML = '';
        exp.style.display = 'none';

        q.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;

            if (answered[current] !== null) {
                btn.classList.add('disabled');
                if (i === q.correct) btn.classList.add('correct');
                if (i === answered[current] && i !== q.correct) btn.classList.add('wrong');
                
                exp.style.display = 'block';
                exp.innerHTML = `<strong>คำอธิบายเฉลย:</strong> ${q.note}`;
            }

            btn.onclick = () => {
                if (answered[current] === null) {
                    answered[current] = i;
                    if (i === q.correct) score++;
                    render();
                }
            };
            container.appendChild(btn);
        });

        document.getElementById('prev-btn').disabled = current === 0;
        document.getElementById('next-btn').innerText = current === allQuestions.length - 1 ? 'ดูคะแนนสรุป' : 'ถัดไป';
    }

    function changeQ(step) {
        if (current + step >= 0 && current + step < allQuestions.length) {
            current += step;
            render();
        } else if (current + step === allQuestions.length) {
            alert("จบการทดสอบแล้ว! คะแนนรวมของคุณคือ: " + score + " / " + allQuestions.length);
        }
    }

    shuffleOptions();
    render();
</script>
