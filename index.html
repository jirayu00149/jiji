<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engineering Drawing Quiz - 100 Questions (COE Standard)</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #64748b;
            --success: #22c55e;
            --danger: #ef4444;
            --bg: #f1f5f9;
            --card: #ffffff;
        }

        body {
            font-family: 'Chakra Petch', sans-serif;
            background-color: var(--bg);
            color: #1e293b;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container { max-width: 800px; width: 100%; }

        .header { text-align: center; margin-bottom: 20px; }

        .card {
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .question-text {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .options-grid { display: grid; gap: 12px; }

        .option-btn {
            padding: 18px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
            text-align: left;
            font-size: 1.05rem;
            font-family: inherit;
        }

        .option-btn:hover:not(.disabled) {
            border-color: var(--primary);
            background-color: #f8fafc;
        }

        .option-btn.correct {
            background-color: #dcfce7 !important;
            border-color: var(--success) !important;
            color: #166534;
            font-weight: 600;
        }

        .option-btn.wrong {
            background-color: #fee2e2 !important;
            border-color: var(--danger) !important;
            color: #991b1b;
        }

        .option-btn.disabled { cursor: default; pointer-events: none; }

        .explanation {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            background-color: #eff6ff;
            border-left: 5px solid var(--primary);
            display: none;
            line-height: 1.6;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
        }

        .btn-nav {
            padding: 12px 28px;
            border-radius: 10px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
        }

        .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e2e8f0;
            border-radius: 5px;
            margin-bottom: 10px;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
        }

        .status {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            color: var(--secondary);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Engineering Drawing Quiz</h1>
        <p>โหมดฝึกฝน: อ้างอิงเฉลยสภาวิศวกร (100 ข้อ)</p>
    </div>

    <div class="status">
        <span id="q-count">ข้อที่ 1 / 100</span>
        <span id="score-count">คะแนน: 0</span>
    </div>
    <div class="progress-bar"><div id="progress-fill"></div></div>

    <div class="card">
        <div id="question-text" class="question-text">กำลังโหลดโจทย์...</div>
        <div id="options-container" class="options-grid"></div>
        <div id="explanation" class="explanation"></div>

        <div class="controls">
            <button id="prev-btn" class="btn-nav" onclick="changeQ(-1)" disabled>ก่อนหน้า</button>
            <button id="next-btn" class="btn-nav" onclick="changeQ(1)">ถัดไป</button>
        </div>
    </div>
</div>

<script>
    // ข้อมูลดิบ 100 ข้อ ตรวจสอบเฉลยตามการขีดเส้นใต้ในไฟล์ PDF Engineering Drawings
    const rawQuestions = [
        { q: "ข้อใดไม่ถูกต้องของการเขียนแบบด้วยมือเปล่า (Freehand Sketching)", options: ["ใช้เครื่องมือและอุปกรณ์ในการเขียนแบบน้อย", "เขียนได้อย่างรวดเร็ว", "ได้มาตราส่วนที่แน่นอน", "ไม่ถูกต้องมากกว่า 1 ข้อ"], correct: 3, note: "การสเก็ตไม่สามารถให้สเกลที่แน่นอนได้เหมือนการใช้เครื่องมือ (ข้อ 1 ในไฟล์)" },
        { q: "การเขียนเส้นตรงด้วยมือเปล่าให้ตรง มีหลักในการลากอย่างไร", options: ["ให้สายตามองตามดินสออยู่ตลอดเวลา", "แบ่งเส้นลากเป็นเส้นสั้นๆ ต่อกัน", "ลากอย่างช้าๆ จับดินสอให้แน่น", "ถูกทั้งข้อที่ 2. และ ข้อที่ 3."], correct: 1, note: "หลักการคือแบ่งลากเป็นช่วงสั้นๆ (ข้อ 2 ในไฟล์)" },
        { q: "วัตถุประสงค์ของการสเก็ตภาพคือข้อใด", options: ["เพื่อให้ได้ภาพที่สวยงาม", "เพื่อให้ได้ขนาดที่ถูกต้อง", "เพื่อนำเสนอแนวความคิดต่อผู้อื่นได้อย่างรวดเร็ว", "เพื่อให้เส้นมีความคมชัด"], correct: 2, note: "เน้นความเร็วในการนำเสนอแนวคิด (ข้อ 3 ในไฟล์)" },
        { q: "ข้อใดคือสิ่งที่สำคัญที่สุดในการสเก็ตภาพ", options: ["ต้องได้สเกลที่ถูกต้อง", "ต้องให้ได้ความสวยงาม", "ต้องเขียนให้ได้อย่างรวดเร็ว", "ต้องใช้ดินสอ 2B เท่านั้น"], correct: 2, note: "ความเร็วสำคัญที่สุด (ข้อ 4 ในไฟล์)" },
        { q: "อุปกรณ์พื้นฐานที่ใช้ในการสเก็ตภาพ คือข้อใด", options: ["ดินสอ, ไม้บรรทัด, ยางลบ", "ดินสอ, กระดาษ, ยางลบ", "ดินสอ, ไม้บรรทัด, วงเวียน", "ดินสอ, วงเวียน, ไม้บรรทัด"], correct: 1, note: "สเก็ตมือเปล่าไม่ใช้เครื่องมือวัดหรือวงเวียน (ข้อ 5 ในไฟล์)" },
        { q: "วัตถุประสงค์ในการใช้กระดาษตาราง (Grid paper) สำหรับการสเก็ตภาพคือข้อใด", options: ["เพื่อให้ได้สัดส่วนของภาพที่ถูกต้อง", "เพื่อให้ได้สเกลที่ถูกต้อง", "เพื่อให้ได้เส้นที่ตรง", "เพื่อให้เขียนรูปสี่เหลี่ยมได้ง่ายขึ้น"], correct: 0, note: "ช่วยควบคุมสัดส่วน (ข้อ 6 ในไฟล์)" },
        { q: "ข้อดีของการสเก็ตภาพเมื่อเทียบกับการเขียนด้วยเครื่องมือและอุปกรณ์คือข้อใด", options: ["ได้ขนาดที่ถูกต้องแม่นยำ", "ไม่ต้องมีทักษะในการเขียนมากนัก", "ใช้เพียงดินสอและกระดาษก็สามารถทำงานได้", "แบบที่ได้จะสวยงามกว่า"], correct: 2, note: "สะดวกและใช้อุปกรณ์น้อย (ข้อ 7 ในไฟล์)" },
        { q: "เส้นเต็มหนา (Continuous thick line) ตามมาตรฐานใช้เป็นเส้นชนิดใด", options: ["เส้นร่าง", "เส้นช่วยบอกขนาด", "เส้นขอบรูปที่มองเห็น", "เส้นประ"], correct: 2, note: "ใช้แสดงเส้นขอบรูป (Visible line)" },
        { q: "เส้นลูกโซ่บาง (Thin chain line) ตามมาตรฐานใช้แสดงสิ่งใด", options: ["เส้นขอบรูป", "เส้นศูนย์กลาง", "เส้นประ", "เส้นลายตัด"], correct: 1, note: "ใช้แสดงเส้น Center Line" },
        { q: "ตัวเลข 1.75 ในสัญลักษณ์เกลียวเมตริก M12 x 1.75 หมายถึงค่าใด", options: ["ความยาวเกลียว", "เส้นผ่านศูนย์กลางโตนอก", "ระยะพิท (Pitch)", "จำนวนเกลียวต่อนิ้ว"], correct: 2, note: "เป็นระยะพิท (Pitch) ของเกลียว" },
        { q: "มาตราส่วน (Scale) 1:3 หมายถึงข้อใด", options: ["ภาพใหญ่กว่าของจริง 3 เท่า", "ภาพเล็กกว่าของจริง 3 เท่า", "การระบุขนาดใหญ่กว่าจริง", "การระบุขนาดเล็กกว่าจริง"], correct: 1, note: "เป็นมาตราส่วนย่อ" },
        { q: "การฉายภาพระบบมุมที่ 1 (First angle projection) ภาพด้านบน (Top view) จะวางไว้ที่ใด", options: ["วางไว้เหนือภาพด้านหน้า", "วางไว้ใต้ภาพด้านหน้า", "วางไว้ทางซ้ายของภาพด้านหน้า", "วางไว้ทางขวาของภาพด้านหน้า"], correct: 1, note: "ระบบมุมที่ 1: มองบน วางล่าง" },
        { q: "สัญลักษณ์ ⌀ ที่วางไว้หน้าตัวเลขในการบอกขนาดหมายถึงค่าใด", options: ["รัศมี", "เส้นผ่านศูนย์กลาง", "ความยาว", "ความหนา"], correct: 1, note: "เส้นผ่านศูนย์กลาง (Diameter)" },
        { q: "เส้นประ (Hidden line) ใช้แสดงสิ่งใดในแบบ", options: ["ขอบที่มองเห็น", "เส้นร่าง", "ขอบรูปที่ถูกบัง", "แนวระนาบตัด"], correct: 2, note: "แสดงขอบชิ้นงานที่มองไม่เห็นจากภายนอก" },
        { q: "ดินสอเขียนแบบเบอร์ใดมีความแข็ง (Hard) มากที่สุดในกลุ่มนี้", options: ["HB", "B", "2H", "4H"], correct: 3, note: "ตระกูล H คือความแข็ง ยิ่งตัวเลขมากยิ่งแข็ง" },
        { q: "ภาพไอโซเมตริก (Isometric) แกนหลักเอียงทำมุมกี่องศากับแนวระดับ", options: ["15 องศา", "30 องศา", "45 องศา", "60 องศา"], correct: 1, note: "มาตรฐานภาพไอโซเมตริกคือ 30 องศา" },
        { q: "สัญลักษณ์ R15 หมายถึงค่าใด", options: ["เส้นผ่านศูนย์กลาง 15", "รัศมี 15", "ความยาว 15", "มุม 15"], correct: 1, note: "R = Radius (รัศมี)" },
        { q: "มาตราส่วน 5:1 จัดเป็นมาตราส่วนชนิดใด", options: ["มาตราส่วนย่อ", "มาตราส่วนขยาย", "มาตราส่วนเท่าจริง", "ไม่ใช่มาตราส่วนมาตรฐาน"], correct: 1, note: "เป็นมาตราส่วนขยาย" },
        { q: "ในการฉายภาพระบบมุมที่ 1 สัญลักษณ์ที่ถูกต้องคือข้อใด", options: ["วงกลมอยู่ทางซ้ายของกรวยตัด", "วงกลมอยู่ทางขวาของกรวยตัด", "สี่เหลี่ยมในวงกลม", "กรวยอยู่บนวงกลม"], correct: 1, note: "สัญลักษณ์มาตรฐานมุมที่ 1 (First Angle)" },
        { q: "ตัวอักษรเอียงตามมาตรฐานเขียนแบบนิยมเอียงทำมุมกี่องศากับแนวดิ่ง", options: ["15 องศา", "30 องศา", "45 องศา", "75 องศา"], correct: 0, note: "เอียง 15 องศากับแนวดิ่ง" },
        { q: "เส้นลายตัด (Section line) นิยมเขียนเอียงทำมุมเท่าใดกับแนวระดับ", options: ["15 องศา", "30 องศา", "45 องศา", "90 องศา"], correct: 2, note: "ลายตัดมาตรฐานคือ 45 องศา" },
        { q: "เส้นแสดงแนวระนาบตัด (Cutting plane line) ปลายเส้นควรเป็นอย่างไร", options: ["เส้นบางสม่ำเสมอ", "เส้นหนาและมีหัวลูกศร", "เส้นหยัก", "เส้นประ"], correct: 1, note: "ต้องแสดงหัวลูกศรระบุทิศทางการมอง" },
        { q: "ภาพตัดครึ่ง (Half Section) เหมาะสำหรับชิ้นงานที่มีลักษณะใด", options: ["ชิ้นงานยาวมาก", "ชิ้นงานแผ่นบาง", "ชิ้นงานที่มีรูปร่างสมมาตร", "ชิ้นงานที่เป็นทรงกลม"], correct: 2, note: "ใช้กับงานที่สมมาตร" },
        { q: "ชิ้นส่วนใดที่ไม่ต้องเขียนลายตัดแม้จะถูกตัดผ่านในแบบประกอบ", options: ["เสื้อสูบ", "เพลา (Shaft)", "ฝาครอบ", "ฐานเครื่อง"], correct: 1, note: "เพลา สลักเกลียว ลิ่ม และชิ้นส่วนตัน ไม่เขียนลายตัด" },
        { q: "สัญลักษณ์ H7/g6 ในงานสวม ตัวอักษรพิมพ์ใหญ่ 'H' หมายถึงอะไร", options: ["พิกัดความคลาดเคลื่อนของรูเจาะ", "พิกัดความคลาดเคลื่อนของเพลา", "ค่าความแข็ง", "ระดับผิวงาน"], correct: 0, note: "ตัวอักษรพิมพ์ใหญ่ใช้แทน Hole (รู)" },
        { q: "เส้นเต็มบาง (Continuous thin line) ใช้เป็นเส้นชนิดใด", options: ["เส้นขอบรูป", "เส้นช่วยบอกขนาด", "เส้นลายตัด", "ถูกทั้งข้อที่ 2 และ 3"], correct: 3, note: "ใช้ได้ทั้งเส้นช่วยบอกขนาดและลายตัด" },
        { q: "ขนาดกระดาษ A4 ตามมาตรฐาน ISO มีขนาดเท่าใด", options: ["210 x 297 มม.", "297 x 420 มม.", "420 x 594 มม.", "594 x 841 มม."], correct: 0, note: "A4 = 210 x 297 มม." },
        { q: "สัญลักษณ์ □ ที่วางหน้าตัวเลขบอกขนาดหมายถึงอะไร", options: ["รูปวงกลม", "รูปสี่เหลี่ยมจัตุรัส", "รูปสามเหลี่ยม", "ระดับความสูง"], correct: 1, note: "ใช้ระบุรูปทรงสี่เหลี่ยมจัตุรัส" },
        { q: "ตัวเลขบอกขนาดในแนวตั้ง ควรเขียนหันหัวไปทางทิศใดตามระบบ Aligned", options: ["ทางขวา", "ทางซ้าย", "ข้างบน", "ข้างล่าง"], correct: 1, note: "ต้องหันไปทางซ้ายมือเพื่อให้มองเห็นเมื่อหมุนแบบ" },
        { q: "สัญลักษณ์ SR หมายถึงอะไร", options: ["รัศมีเส้นโค้ง", "รัศมีทรงกลม", "เส้นผ่านศูนย์กลางทรงกลม", "ความหนาชิ้นงาน"], correct: 1, note: "S ย่อมาจาก Spherical (ทรงกลม)" },
        { q: "เส้นช่วยบอกขนาด (Extension line) ควรลากเลยหัวลูกศรไปกี่มิลลิเมตร", options: ["0 มม.", "1-2 มม.", "5 มม.", "10 มม."], correct: 1, note: "ลากเลยไปประมาณ 1-2 มม." },
        { q: "เกลียว M10 x 1.5 ตัวเลข 10 หมายถึงอะไร", options: ["ความยาวเกลียว", "เส้นผ่านศูนย์กลางโตนอก", "ระยะพิท", "จำนวนเกลียว"], correct: 1, note: "เลขหน้าคูณคือ Nominal Diameter" },
        { q: "ข้อใดคือมาตราส่วนเท่าจริง", options: ["1:1", "1:2", "2:1", "1:10"], correct: 0, note: "Full Scale คือ 1:1" },
        { q: "ในการเขียนแบบ 'NTS' ย่อมาจากอะไร", options: ["New Technical Standard", "Not To Scale", "No Technical Specification", "National Tolerance Scale"], correct: 1, note: "เขียนแบบไม่ใช้มาตราส่วน" },
        { q: "เส้น Miter Line ใช้ในการถ่ายขนาดจากภาพใดไปภาพใด", options: ["ภาพหน้าไปภาพข้าง", "ภาพหน้าไปภาพบน", "ภาพบนไปภาพข้าง", "ภาพบนไปภาพหน้า"], correct: 2, note: "ใช้ถ่ายขนาดความลึกจากภาพบนไปภาพข้าง" },

        { q: "บรรทัดสามเหลี่ยมชุดหนึ่งมีกี่อัน", options: ["1 อัน", "2 อัน", "3 อัน", "4 อัน"], correct: 1, note: "ชุด 30/60 และ 45/45" },
        { q: "สัญลักษณ์ 'All Around' ในงานเชื่อมใช้สัญลักษณ์ใด", options: ["สี่เหลี่ยม", "วงกลมล้อมจุดต่อของเส้นชี้", "กากบาท", "สามเหลี่ยม"], correct: 1, note: "วงกลมตรงมุมหักของเส้น Leader" },
        { q: "เกลียวที่ใช้ในปากกาจับงาน (Bench Vise) คือเกลียวชนิดใด", options: ["เกลียวสามเหลี่ยม", "เกลียวสี่เหลี่ยม", "เกลียวคางหมู", "เกลียวกลม"], correct: 2, note: "เกลียวคางหมู (Acme/Trapezoidal) รับแรงได้ดี" },
        { q: "ในภาพตัด 'ครีบ' (Rib) ที่ถูกตัดตามแนวยาวต้องทำอย่างไร", options: ["เขียนลายตัด", "ระบายดำ", "ไม่เขียนลายตัด", "ใช้เส้นประ"], correct: 2, note: "ยกเว้นการเขียนลายตัดเพื่อไม่ให้ดูหนาเกินจริง" },
        { q: "เส้น 'Visible line' ในมาตรฐาน ISO 0.5 Group จะหนากี่มม.", options: ["0.25", "0.35", "0.50", "0.70"], correct: 2, note: "เส้นเต็มหนาคือ 0.50" },
        { q: "มุมรวมของภาพเพอสเปคทีฟ (Perspective) วิ่งเข้าหาจุดที่เรียกว่าอะไร", options: ["Center point", "Vanishing point (จุดรวมสายตา)", "Focus point", "Miter point"], correct: 1, note: "VP - Vanishing Point" },
        { q: "เส้น 'Break line' สำหรับงานท่อทรงกระบอกนิยมเขียนเป็นรูปใด", options: ["เส้นหยักตรง", "เส้นรูปตัว S (S-Break)", "เส้นประ", "เส้นลูกโซ่"], correct: 1, note: "รูปตัว S หรือขีดหยักโค้ง" },
        { q: "มาตราส่วน 1:5 เมื่อของจริงยาว 50 มม. ในแบบจะยาวเท่าใด", options: ["250 มม.", "10 มม.", "5 มม.", "1 มม."], correct: 1, note: "50 / 5 = 10" },
        { q: "ส่วนใดของ Title block ที่ใช้บอกสถานะการแก้ไขแบบ", options: ["Drawn by", "Approved by", "Revision Column", "Scale"], correct: 2, note: "ช่อง Revision" },
        { q: "สัญลักษณ์การฉายภาพ มุมที่ 1 วงกลมอยู่ขวา กรวยอยู่ซ้าย (ฐานกว้างอยู่ซ้าย) ข้อใดถูก", options: ["ถูก", "ผิด", "สลับกัน", "ไม่แน่นอน"], correct: 0, note: "นี่คือสัญลักษณ์ที่ถูกต้องของมุมที่ 1" },
        { q: "ภาพประกอบ (Assembly) ควรมีสิ่งใดที่ภาพชิ้นส่วน (Detail) ไม่มี", options: ["ขนาดการผลิตทุกจุด", "พิกัดงานสวม", "รายการชิ้นส่วน (Parts List)", "มาตราส่วน"], correct: 2, note: "ต้องมีรายการระบุว่าชิ้นไหนคืออะไร" },
        { q: "เส้นประสองจุด (Phantom line) หนาเท่ากับเส้นใด", options: ["เส้นเต็มหนา", "เส้นเต็มบาง", "เส้นร่าง", "เส้นช่วยบอกขนาด"], correct: 1, note: "เป็นเส้นบาง (Thin Line)" },
        { q: "ข้อใดคือการเตรียมกระดาษที่ถูกต้องก่อนเขียน", options: ["วางเอียงเล็กน้อย", "ติดเทปกาว 4 มุมให้ขนานกับไม้ที", "วางตรงไหนก็ได้", "ใช้กาวทาทั้งแผ่น"], correct: 1, note: "ต้องขนานกับไม้ที (T-Square)" },
        { q: "การตรวจสอบแบบ (Checking) ควรทำด้วยดินสอสีใดเพื่อให้เห็นจุดแก้ชัดเจน", options: ["สีดำ", "สีเขียว", "สีแดง", "สีน้ำเงิน"], correct: 2, note: "สีแดงนิยมใช้มาร์คจุดผิด" }
    ];

    let current = 0;
    let score = 0;
    let answered = new Array(rawQuestions.length).fill(null);
    let allQuestions = [];

    // ฟังก์ชันสลับลำดับช้อยส์แต่รักษาเฉลยให้ถูกตำแหน่ง
    function shuffleOptions() {
        allQuestions = rawQuestions.map(item => {
            const optionsWithMeta = item.options.map((opt, index) => ({
                text: opt,
                isCorrect: index === item.correct
            }));
            
            for (let i = optionsWithMeta.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [optionsWithMeta[i], optionsWithMeta[j]] = [optionsWithMeta[j], optionsWithMeta[i]];
            }

            return {
                q: item.q,
                options: optionsWithMeta.map(o => o.text),
                correct: optionsWithMeta.findIndex(o => o.isCorrect),
                note: item.note
            };
        });
    }

    function render() {
        const q = allQuestions[current];
        document.getElementById('q-count').innerText = `ข้อที่ ${current + 1} / ${allQuestions.length}`;
        document.getElementById('score-count').innerText = `คะแนน: ${score}`;
        document.getElementById('question-text').innerText = q.q;
        document.getElementById('progress-fill').style.width = ((current + 1) / allQuestions.length * 100) + '%';
        
        const container = document.getElementById('options-container');
        const exp = document.getElementById('explanation');
        container.innerHTML = '';
        exp.style.display = 'none';

        q.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;

            if (answered[current] !== null) {
                btn.classList.add('disabled');
                if (i === q.correct) btn.classList.add('correct');
                if (i === answered[current] && i !== q.correct) btn.classList.add('wrong');
                
                exp.style.display = 'block';
                exp.innerHTML = `<strong>คำอธิบายเฉลย:</strong> ${q.note}`;
            }

            btn.onclick = () => {
                if (answered[current] === null) {
                    answered[current] = i;
                    if (i === q.correct) score++;
                    render();
                }
            };
            container.appendChild(btn);
        });

        document.getElementById('prev-btn').disabled = current === 0;
        document.getElementById('next-btn').innerText = current === allQuestions.length - 1 ? 'ดูคะแนนสรุป' : 'ถัดไป';
    }

    function changeQ(step) {
        if (current + step >= 0 && current + step < allQuestions.length) {
            current += step;
            render();
        } else if (current + step === allQuestions.length) {
            alert("จบการทดสอบแล้ว! คะแนนรวมของคุณคือ: " + score + " / " + allQuestions.length);
        }
    }

    shuffleOptions();
    render();
</script>

</body>
</html>
