<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engineering Drawing Quiz - 100 Questions (COE Standard)</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #64748b;
            --success: #22c55e;
            --danger: #ef4444;
            --bg: #f1f5f9;
            --card: #ffffff;
        }

        body {
            font-family: 'Chakra Petch', sans-serif;
            background-color: var(--bg);
            color: #1e293b;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container { max-width: 800px; width: 100%; }

        .header { text-align: center; margin-bottom: 20px; }

        .card {
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .question-text {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .options-grid { display: grid; gap: 12px; }

        .option-btn {
            padding: 18px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
            text-align: left;
            font-size: 1.05rem;
            font-family: inherit;
        }

        .option-btn:hover:not(.disabled) {
            border-color: var(--primary);
            background-color: #f8fafc;
        }

        .option-btn.correct {
            background-color: #dcfce7 !important;
            border-color: var(--success) !important;
            color: #166534;
            font-weight: 600;
        }

        .option-btn.wrong {
            background-color: #fee2e2 !important;
            border-color: var(--danger) !important;
            color: #991b1b;
        }

        .option-btn.disabled { cursor: default; pointer-events: none; }

        .explanation {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            background-color: #eff6ff;
            border-left: 5px solid var(--primary);
            display: none;
            line-height: 1.6;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
        }

        .btn-nav {
            padding: 12px 28px;
            border-radius: 10px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
        }

        .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e2e8f0;
            border-radius: 5px;
            margin-bottom: 10px;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
        }

        .status {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            color: var(--secondary);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Engineering Drawing Quiz</h1>
        <p>โหมดฝึกฝน: อ้างอิงเฉลยสภาวิศวกร (100 ข้อ)</p>
    </div>

    <div class="status">
        <span id="q-count">ข้อที่ 1 / 100</span>
        <span id="score-count">คะแนน: 0</span>
    </div>
    <div class="progress-bar"><div id="progress-fill"></div></div>

    <div class="card">
        <div id="question-text" class="question-text">กำลังโหลดโจทย์...</div>
        <div id="options-container" class="options-grid"></div>
        <div id="explanation" class="explanation"></div>

        <div class="controls">
            <button id="prev-btn" class="btn-nav" onclick="changeQ(-1)" disabled>ก่อนหน้า</button>
            <button id="next-btn" class="btn-nav" onclick="changeQ(1)">ถัดไป</button>
        </div>
    </div>
</div>

<script>
    // ข้อมูลดิบ 100 ข้อ ตรวจสอบเฉลยตามการขีดเส้นใต้ในไฟล์ PDF Engineering Drawings
    // ข้อมูลดิบ 100 ข้อ แก้ไขเฉลยตามการขีดเส้นใต้ในไฟล์สภาวิศวกร 100% (รวมข้อ 1 และ 2)
    const rawQuestions = [
        // หมวด 1: พื้นฐานและการสเก็ตภาพ
        { 
            q: "ข้อใดไม่ถูกต้องของการเขียนแบบด้วยมือเปล่า (Freehand Sketching)", 
            options: ["ใช้เครื่องมือและอุปกรณ์ในการเขียนแบบน้อย", "เขียนได้อย่างรวดเร็ว", "ได้มาตราส่วนที่แน่นอน", "ไม่ถูกต้องมากกว่า 1 ข้อ"], 
            correct: 3, 
            note: "การสเก็ตภาพด้วยมือเปล่ามีข้อจำกัดด้านความแม่นยำ จึงไม่สามารถให้สเกลที่แน่นอนได้ และในทางปฏิบัติยังมีปัจจัยอื่นที่ทำให้การสื่อสารคลาดเคลื่อนหากไม่ระวัง" 
        },
        { 
            q: "การเขียนเส้นตรงด้วยมือเปล่าให้ตรง มีหลักในการลากอย่างไร", 
            options: ["ให้สายตามองตามดินสออยู่ตลอดเวลา", "แบ่งเส้นลากเป็นเส้นสั้นๆ ต่อกัน", "ลากอย่างช้าๆ จับดินสอให้แน่น", "ถูกทั้งข้อที่ 2. และ ข้อที่ 3."], 
            correct: 1, 
            note: "เทคนิคการแบ่งเส้นลากเป็นช่วงสั้นๆ ต่อเนื่องกัน ช่วยลดแรงสั่นสะเทือนของมือและทำให้ควบคุมแนวเส้นให้ตรงได้ดีกว่าการลากยาวครั้งเดียว" 
        },
        { 
            q: "วัตถุประสงค์ของการสเก็ตภาพคือข้อใด", 
            options: ["เพื่อให้ได้ภาพที่สวยงาม", "เพื่อให้ได้ขนาดที่ถูกต้อง", "เพื่อนำเสนอแนวความคิดต่อผู้อื่นได้อย่างรวดเร็ว", "เพื่อให้เส้นมีความคมชัด"], 
            correct: 2, 
            note: "หัวใจสำคัญของการสเก็ตคือความเร็ว (Speed) เพื่อบันทึกหรือถ่ายทอดแนวความคิดทางวิศวกรรมให้ผู้อื่นเข้าใจภาพรวมเบื้องต้นได้ทันที" 
        },
        { 
            q: "ข้อใดคือสิ่งที่สำคัญที่สุดในการสเก็ตภาพ", 
            options: ["ต้องได้สเกลที่ถูกต้อง", "ต้องให้ได้ความสวยงาม", "ต้องเขียนให้ได้อย่างรวดเร็ว", "ต้องใช้ดินสอ 2B เท่านั้น"], 
            correct: 2, 
            note: "วิศวกรใช้การสเก็ตเพื่อตัดสินใจหรือแก้ปัญหาระหว่างการประชุมหรือหน้างาน ความเร็วในการสื่อสารข้อมูลจึงเป็นปัจจัยที่สำคัญที่สุด" 
        },
        { 
            q: "อุปกรณ์พื้นฐานที่ใช้ในการสเก็ตภาพ คือข้อใด", 
            options: ["ดินสอ, ไม้บรรทัด, ยางลบ", "ดินสอ, กระดาษ, ยางลบ", "ดินสอ, ไม้บรรทัด, วงเวียน", "ดินสอ, วงเวียน, ไม้บรรทัด"], 
            correct: 1, 
            note: "นิยามของ Freehand Sketching คือการใช้มือเปล่าโดยไม่พึ่งพาเครื่องมือช่วยลากเส้น อุปกรณ์พื้นฐานจึงมีเพียงเครื่องมือเขียนและกระดาษ" 
        },
        { 
            q: "วัตถุประสงค์ในการใช้กระดาษตาราง (Grid paper) สำหรับการสเก็ตภาพคือข้อใด", 
            options: ["เพื่อให้ได้สัดส่วนของภาพที่ถูกต้อง", "เพื่อให้ได้สเกลที่ถูกต้อง", "เพื่อให้ได้เส้นที่ตรง", "เพื่อให้เขียนรูปสี่เหลี่ยมได้ง่ายขึ้น"], 
            correct: 0, 
            note: "เส้นตารางทำหน้าที่เป็นแนวทาง (Guide) ช่วยให้กะระยะสัดส่วน (Proportion) ของภาพฉายแต่ละด้านให้สัมพันธ์กันได้อย่างถูกต้อง" 
        },
        { 
            q: "ข้อดีของการสเก็ตภาพเมื่อเทียบกับการเขียนด้วยเครื่องมือและอุปกรณ์คือข้อใด", 
            options: ["ได้ขนาดที่ถูกต้องแม่นยำ", "ไม่ต้องมีทักษะในการเขียนมากนัก", "ใช้เพียงดินสอและกระดาษก็สามารถทำงานได้", "แบบที่ได้จะสวยงามกว่า"], 
            correct: 2, 
            note: "ความคล่องตัว (Mobility) คือจุดเด่น เพราะใช้อุปกรณ์น้อยและเริ่มงานได้ทันทีโดยไม่ต้องตั้งโต๊ะเขียนแบบ" 
        },
        { 
            q: "ตารางรายการแบบ (Title Block) ควรวางไว้ตำแหน่งใดในกระดาษเขียนแบบ", 
            options: ["ด้านล่างขวามือ", "ด้านล่างซ้ายมือ", "ด้านล่างตรงกลาง", "อยู่ตำแหน่งใดก็ได้แล้วแต่เหมาะสม"], 
            correct: 0, 
            note: "ตามมาตรฐานสากล Title Block ต้องวางไว้ที่มุมล่างขวา เพื่อความสะดวกในการค้นหาและบริหารจัดการแบบเมื่อพับกระดาษเก็บในแฟ้ม" 
        },
        { 
            q: "เกลียวระบบเมตริก M12 x 1.75 หมายความว่าอย่างไร", 
            options: ["เส้นผ่านศูนย์กลาง 1.75 มม. ยาว 12 มม.", "จำนวน 12 เกลียวต่อ 1 มม. โต 1.75 มม.", "โต 1.75 มม. ยาว 12 มม.", "เส้นผ่านศูนย์กลาง 12 มม. ระยะพิท 1.75 มม."], 
            correct: 3, 
            note: "M หมายถึงระบบเมตริก ตัวเลขหน้าคือขนาดเส้นผ่านศูนย์กลางระบุ (Nominal Diameter) และตัวเลขหลังคือระยะพิท (Pitch)" 
        },
        { 
            q: "ประโยชน์หลักของการเขียนภาพช่วย (Auxiliary view) คือข้อใด", 
            options: ["ใช้แสดงเส้นที่มองไม่เห็น", "ใช้แสดงรูปร่างจริงของวัตถุส่วนที่เอียง", "ใช้แสดงภาพลายตัด", "ใช้เขียนภาพฉายพื้นฐาน"], 
            correct: 1, 
            note: "ภาพช่วยใช้สำหรับฉายพื้นผิวที่เอียงซึ่งไม่ขนานกับระนาบฉายหลัก เพื่อให้เห็นรูปร่างและขนาดที่แท้จริง (True Shape)" 
        },

        // หมวด 2: มาตรฐานเส้นและการฉายภาพ
        { 
            q: "เส้นแบบใด ใช้ในการแสดงเพื่อบอกศูนย์กลางของวงกลม", 
            options: ["เส้นเต็มบาง", "เส้นประ", "เส้นลูกโซ่บาง", "เส้นเต็มหนา"], 
            correct: 2, 
            note: "เส้นลูกโซ่บาง (Thin Chain line) ทำหน้าที่เป็น Center line เพื่อระบุแกนสมมาตรและตำแหน่งจุดกึ่งกลางของวงกลม" 
        },
        { 
            q: "อัตราส่วน (scale) 1:3 หมายถึง", 
            options: ["ขนาดในภาพเขียนจะใหญ่กว่าขนาดจริง 3 เท่า", "ขนาดในภาพเขียนจะเล็กกว่าขนาดจริง 3 เท่า", "การบอกขนาดใหญ่กว่าจริง", "การบอกขนาดเล็กกว่าจริง"], 
            correct: 1, 
            note: "มาตราส่วน 1:3 เป็นมาตราส่วนย่อ โดยระยะ 1 ส่วนในแบบ มีค่าเท่ากับระยะ 3 ส่วนจริงของวัตถุ" 
        },
        { 
            q: "เส้นเต็มบาง (Continuous thin line) ใช้ในกรณีใดได้บ้าง", 
            options: ["เส้นรอบรูป ขอบที่เห็นชัด", "เส้นรอบรูป ขอบที่ถูกบัง", "เส้นลายตัด", "เส้นผ่านศูนย์กลาง"], 
            correct: 2, 
            note: "เส้นเต็มบางถูกกำหนดให้ใช้ในงานลายตัด (Section lines) เพื่อแสดงเนื้อวัสดุที่ถูกระนาบตัดผ่านโดยไม่ให้เด่นชัดกว่าเส้นขอบรูป" 
        },
        { 
            q: "ในงานเขียนแบบที่ใช้กลุ่มเส้น 0.5, 0.35, และ 0.25 การเขียนเส้นประ (Hidden line) ใช้ขนาดเท่าใด", 
            options: ["0.5 มม.", "0.35 มม.", "0.25 มม.", "ขนาดใดก็ได้"], 
            correct: 1, 
            note: "ตามมาตรฐานกลุ่มเส้น ISO เมื่อเส้นเต็มหนาคือ 0.5 มม. เส้นประหรือเส้นศูนย์กลางซึ่งเป็นเส้นบางจะใช้ขนาดลดลง 1 ระดับคือ 0.35 มม." 
        },
        { 
            q: "ขนาดกระดาษ A4 มีขนาดความกว้างและยาวเท่าไร", 
            options: ["210 x 297", "297 x 420", "420 x 594", "594 x 840"], 
            correct: 0, 
            note: "กระดาษ A4 มีขนาดมาตรฐาน 210 x 297 มิลลิเมตร เป็นขนาดที่นิยมใช้ที่สุดในงานเอกสารและงานเขียนแบบเบื้องต้น" 
        },
        { 
            q: "การเขียนเส้นผ่านศูนย์กลางของวงกลม ใช้เส้นใด", 
            options: ["เส้นเต็มหนัก", "เส้นเต็มบาง", "เส้นศูนย์กลางเล็ก", "เส้นศูนย์กลางใหญ่"], 
            correct: 2, 
            note: "การระบุแนวผ่านศูนย์กลางต้องใช้เส้นศูนย์กลาง (Center line) ซึ่งในมาตรฐานกลุ่มเส้นจะเรียกว่าเส้นศูนย์กลางเล็ก" 
        },
        { 
            q: "การเอียงของตัวอักษรที่เหมาะสมควรเอียง", 
            options: ["15 องศา กับแนวดิ่งเอียงด้านหน้า", "75 องศา กับแนวดิ่งเอียงด้านหลัง", "15 องศา กับแนวดิ่งเอียงด้านหลัง", "75 องศา กับแนวนอนเอียงด้านหน้า"], 
            correct: 0, 
            note: "ตามมาตรฐาน ISO 3098 ตัวอักษรเอียง (Type B) ต้องเอียงไปทางขวาทำมุม 15 องศากับแนวดิ่ง" 
        },
        { 
            q: "ดินสอเขียนแบบเบอร์ใดมีความแข็ง (Hard) มากที่สุดในกลุ่มนี้", 
            options: ["HB", "B", "2H", "3H"], 
            correct: 3, 
            note: "H (Hard) ระบุความแข็ง ยิ่งตัวเลขนำหน้ามาก ไส้จะยิ่งแข็งและสีจะจางลง จึงทำให้ 3H แข็งที่สุดในตัวเลือก" 
        },
        { 
            q: "กระดาษขนาด A4 เป็นกี่เท่าของ A1", 
            options: ["1/8", "1/4", "4", "8"], 
            correct: 0, 
            note: "การแบ่งขนาดกระดาษ A-Series คือการแบ่งครึ่งพื้นที่ไปเรื่อยๆ (A1 -> A2(1/2) -> A3(1/4) -> A4(1/8))" 
        },
        { 
            q: "มาตราส่วน 5:1 จัดเป็นมาตราส่วนประเภทใด", 
            options: ["มาตราส่วนย่อ", "มาตราส่วนขยาย", "มาตราส่วนเท่าจริง", "ไม่ใช่มาตราส่วนมาตรฐาน"], 
            correct: 1, 
            note: "เมื่อตัวเลขหน้ามากกว่าตัวเลขหลัง (5:1) แสดงว่าขนาดในแบบจำลองใหญ่กว่าขนาดจริงของวัตถุ จึงเป็นมาตราส่วนขยาย" 
        },

        // หมวด 3: การให้ขนาดและสัญลักษณ์ (21-40)
        { 
            q: "สัญลักษณ์ ⌀ ที่วางไว้หน้าตัวเลขในการบอกขนาดหมายถึงค่าใด", 
            options: ["รัศมี", "เส้นผ่านศูนย์กลาง", "ความยาว", "ความหนา"], 
            correct: 1, 
            note: "เครื่องหมาย ⌀ (Diameter) เป็นสัญลักษณ์มาตรฐานสากลเพื่อระบุความโตของทรงกระบอกหรือรูเจาะ" 
        },
        { 
            q: "สัญลักษณ์ □ หน้าตัวเลขบอกขนาดหมายถึงอะไร",

    ];

    let current = 0;
    let score = 0;
    let answered = new Array(rawQuestions.length).fill(null);
    let allQuestions = [];

    // ฟังก์ชันสลับลำดับช้อยส์แต่รักษาเฉลยให้ถูกตำแหน่ง
    function shuffleOptions() {
        allQuestions = rawQuestions.map(item => {
            const optionsWithMeta = item.options.map((opt, index) => ({
                text: opt,
                isCorrect: index === item.correct
            }));
            
            for (let i = optionsWithMeta.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [optionsWithMeta[i], optionsWithMeta[j]] = [optionsWithMeta[j], optionsWithMeta[i]];
            }

            return {
                q: item.q,
                options: optionsWithMeta.map(o => o.text),
                correct: optionsWithMeta.findIndex(o => o.isCorrect),
                note: item.note
            };
        });
    }

    function render() {
        const q = allQuestions[current];
        document.getElementById('q-count').innerText = `ข้อที่ ${current + 1} / ${allQuestions.length}`;
        document.getElementById('score-count').innerText = `คะแนน: ${score}`;
        document.getElementById('question-text').innerText = q.q;
        document.getElementById('progress-fill').style.width = ((current + 1) / allQuestions.length * 100) + '%';
        
        const container = document.getElementById('options-container');
        const exp = document.getElementById('explanation');
        container.innerHTML = '';
        exp.style.display = 'none';

        q.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;

            if (answered[current] !== null) {
                btn.classList.add('disabled');
                if (i === q.correct) btn.classList.add('correct');
                if (i === answered[current] && i !== q.correct) btn.classList.add('wrong');
                
                exp.style.display = 'block';
                exp.innerHTML = `<strong>คำอธิบายเฉลย:</strong> ${q.note}`;
            }

            btn.onclick = () => {
                if (answered[current] === null) {
                    answered[current] = i;
                    if (i === q.correct) score++;
                    render();
                }
            };
            container.appendChild(btn);
        });

        document.getElementById('prev-btn').disabled = current === 0;
        document.getElementById('next-btn').innerText = current === allQuestions.length - 1 ? 'ดูคะแนนสรุป' : 'ถัดไป';
    }

    function changeQ(step) {
        if (current + step >= 0 && current + step < allQuestions.length) {
            current += step;
            render();
        } else if (current + step === allQuestions.length) {
            alert("จบการทดสอบแล้ว! คะแนนรวมของคุณคือ: " + score + " / " + allQuestions.length);
        }
    }

    shuffleOptions();
    render();
</script>
