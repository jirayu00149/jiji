<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engineering Drawing Quiz - 100 Questions (COE Standard)</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #64748b;
            --success: #22c55e;
            --danger: #ef4444;
            --bg: #f1f5f9;
            --card: #ffffff;
        }

        body {
            font-family: 'Chakra Petch', sans-serif;
            background-color: var(--bg);
            color: #1e293b;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container { max-width: 800px; width: 100%; }

        .header { text-align: center; margin-bottom: 20px; }

        .card {
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .question-text {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .options-grid { display: grid; gap: 12px; }

        .option-btn {
            padding: 18px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
            text-align: left;
            font-size: 1.05rem;
            font-family: inherit;
        }

        .option-btn:hover:not(.disabled) {
            border-color: var(--primary);
            background-color: #f8fafc;
        }

        .option-btn.correct {
            background-color: #dcfce7 !important;
            border-color: var(--success) !important;
            color: #166534;
            font-weight: 600;
        }

        .option-btn.wrong {
            background-color: #fee2e2 !important;
            border-color: var(--danger) !important;
            color: #991b1b;
        }

        .option-btn.disabled { cursor: default; pointer-events: none; }

        .explanation {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            background-color: #eff6ff;
            border-left: 5px solid var(--primary);
            display: none;
            line-height: 1.6;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
        }

        .btn-nav {
            padding: 12px 28px;
            border-radius: 10px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
        }

        .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e2e8f0;
            border-radius: 5px;
            margin-bottom: 10px;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
        }

        .status {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            color: var(--secondary);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Engineering Drawing Quiz</h1>
        <p>อ้างอิงเฉลยสภาวิศวกร (100 ข้อ)</p>
    </div>

    <div class="status">
        <span id="q-count">ข้อที่ 1 / 100</span>
        <span id="score-count">คะแนน: 0</span>
    </div>
    <div class="progress-bar"><div id="progress-fill"></div></div>

    <div class="card">
        <div id="question-text" class="question-text">กำลังโหลดโจทย์...</div>
        <div id="options-container" class="options-grid"></div>
        <div id="explanation" class="explanation"></div>

        <div class="controls">
            <button id="prev-btn" class="btn-nav" onclick="changeQ(-1)" disabled>ก่อนหน้า</button>
            <button id="next-btn" class="btn-nav" onclick="changeQ(1)">ถัดไป</button>
        </div>
    </div>
</div>

<script>
    // ข้อมูลดิบ 100 ข้อ ตรวจสอบเฉลยตามการขีดเส้นใต้ในไฟล์ PDF Engineering Drawings
    const rawQuestions = [
        // === หมวด 1: พื้นฐานและการสเก็ตภาพ (ข้อ 1 - 20) ===
        { q: "ข้อใดไม่ถูกต้องของการเขียนแบบด้วยมือเปล่า (Freehand Sketching)", options: ["ใช้เครื่องมือและอุปกรณ์ในการเขียนแบบน้อย", "เขียนได้อย่างรวดเร็ว", "ได้มาตราส่วนที่แน่นอน", "ไม่ถูกต้องมากกว่า 1 ข้อ"], correct: 2, note: "การสเก็ตไม่สามารถให้มาตราส่วนที่แน่นอนได้เหมือนการใช้เครื่องมือวัด (อ้างอิงข้อ 1 ในไฟล์)" },
        { q: "การเขียนเส้นตรงด้วยมือเปล่าให้ตรง มีหลักในการลากอย่างไร", options: ["ให้สายตามองตามดินสออยู่ตลอดเวลา", "แบ่งเส้นลากเป็นเส้นสั้นๆ ต่อกัน", "ลากอย่างช้าๆ จับดินสอให้แน่น", "ถูกทั้งข้อที่ 2. และ ข้อที่ 3."], correct: 1, note: "หลักการลากเส้นตรงแบบ Freehand คือการแบ่งลากเป็นช่วงสั้นๆ ต่อเนื่องกัน (อ้างอิงข้อ 2 ในไฟล์)" },
        { q: "วัตถุประสงค์ของการสเก็ตภาพคือข้อใด", options: ["เพื่อให้ได้ภาพที่สวยงาม", "เพื่อให้ได้ขนาดที่ถูกต้อง", "เพื่อนำเสนอแนวความคิดต่อผู้อื่นได้อย่างรวดเร็ว", "เพื่อให้เส้นมีความคมชัด"], correct: 2, note: "เน้นการสื่อสารแนวคิดที่รวดเร็ว (อ้างอิงข้อ 3 ในไฟล์)" },
        { q: "ข้อใดคือสิ่งที่สำคัญที่สุดในการสเก็ตภาพ", options: ["ต้องได้สเกลที่ถูกต้อง", "ต้องให้ได้ความสวยงาม", "ต้องเขียนให้ได้อย่างรวดเร็ว", "ต้องใช้ดินสอ 2B เท่านั้น"], correct: 2, note: "ความเร็วเป็นหัวใจสำคัญของการสเก็ต (อ้างอิงข้อ 4 ในไฟล์)" },
        { q: "อุปกรณ์พื้นฐานที่ใช้ในการสเก็ตภาพ คือข้อใด", options: ["ดินสอ, ไม้บรรทัด, ยางลบ", "ดินสอ, กระดาษ, ยางลบ", "ดินสอ, ไม้บรรทัด, วงเวียน", "ดินสอ, วงเวียน, ไม้บรรทัด"], correct: 1, note: "สเก็ตมือเปล่าใช้เพียงดินสอ กระดาษ และยางลบเท่านั้น (อ้างอิงข้อ 5 ในไฟล์)" },
        { q: "วัตถุประสงค์ในการใช้กระดาษตาราง (Grid paper) สำหรับการสเก็ตภาพคือข้อใด", options: ["เพื่อให้ได้สัดส่วนของภาพที่ถูกต้อง", "เพื่อให้ได้สเกลที่ถูกต้อง", "เพื่อให้ได้เส้นที่ตรง", "เพื่อให้เขียนรูปสี่เหลี่ยมได้ง่ายขึ้น"], correct: 0, note: "ช่วยควบคุมสัดส่วนให้ใกล้เคียงความจริง (อ้างอิงข้อ 6 ในไฟล์)" },
        { q: "ข้อดีของการสเก็ตภาพเมื่อเทียบกับการเขียนด้วยเครื่องมือและอุปกรณ์คือข้อใด", options: ["ได้ขนาดที่ถูกต้องแม่นยำ", "ไม่ต้องมีทักษะในการเขียนมากนัก", "ใช้เพียงดินสอและกระดาษก็สามารถทำงานได้", "แบบที่ได้จะสวยงามกว่า"], correct: 2, note: "ใช้อุปกรณ์น้อยและทำงานได้รวดเร็ว (อ้างอิงข้อ 7 ในไฟล์)" },
        { q: "ตารางรายการแบบ (Title Block) ควรวางไว้ตำแหน่งใดในกระดาษเขียนแบบ", options: ["ด้านล่างขวามือ", "ด้านล่างซ้ายมือ", "ด้านล่างตรงกลาง", "อยู่ตำแหน่งใดก็ได้แล้วแต่เหมาะสม"], correct: 0, note: "มุมล่างขวาเป็นมาตรฐานเพื่อให้เห็นข้อมูลได้ชัดเจนเมื่อพับแบบ (อ้างอิงข้อ 14 ในไฟล์)" },
        { q: "เกลียวระบบเมตริก M12 x 1.75 หมายความว่าอย่างไร", options: ["เส้นผ่านศูนย์กลาง 1.75 มม. ยาว 12 มม.", "จำนวน 12 เกลียวต่อ 1 มม. โต 1.75 มม.", "โต 1.75 มม. ยาว 12 มม.", "เส้นผ่านศูนย์กลาง 12 มม. ระยะพิท 1.75 มม."], correct: 3, note: "M=Metric, 12=Diameter, 1.75=Pitch (อ้างอิงข้อ 15 ในไฟล์)" },
        { q: "ประโยชน์หลักของการเขียนภาพช่วย (Auxiliary view) คือข้อใด", options: ["ใช้แสดงเส้นที่มองไม่เห็น", "ใช้แสดงรูปร่างจริงของวัตถุส่วนที่เอียง", "ใช้แสดงภาพลายตัด", "ใช้เขียนภาพฉายพื้นฐาน"], correct: 1, note: "ใช้เพื่อดูขนาดและรูปร่างที่แท้จริงของพื้นผิวที่เอียง (อ้างอิงข้อ 20 ในไฟล์)" },
        { q: "เส้นเต็มหนา (Continuous thick line) ตามมาตรฐานใช้เป็นเส้นชนิดใด", options: ["เส้นร่าง", "เส้นช่วยบอกขนาด", "เส้นขอบรูปที่มองเห็น", "เส้นประ"], correct: 2, note: "ใช้สำหรับขอบรูปที่มองเห็นชัดเจน (Visible lines)" },
        { q: "เส้นลูกโซ่บาง (Thin chain line) ตามมาตรฐานใช้แสดงสิ่งใด", options: ["เส้นขอบรูป", "เส้นศูนย์กลาง", "เส้นประ", "เส้นลายตัด"], correct: 1, note: "ใช้แสดงเส้นศูนย์กลางหรือแกนสมมาตร (Center line)" },
        { q: "มาตราส่วน (Scale) 1:2 จัดเป็นมาตราส่วนประเภทใด", options: ["มาตราส่วนขยาย", "มาตราส่วนเท่าจริง", "มาตราส่วนย่อ", "มาตราส่วนผิดปกติ"], correct: 2, note: "แบบเล็กกว่าของจริง คือมาตราส่วนย่อ" },
        { q: "มาตราส่วน 5:1 จัดเป็นมาตราส่วนประเภทใด", options: ["มาตราส่วนย่อ", "มาตราส่วนขยาย", "มาตราส่วนเท่าจริง", "ไม่ใช่มาตราส่วนมาตรฐาน"], correct: 1, note: "แบบใหญ่กว่าของจริง คือมาตราส่วนขยาย" },
        { q: "สัญลักษณ์ ⌀ ที่วางไว้หน้าตัวเลขในการบอกขนาดหมายถึงค่าใด", options: ["รัศมี", "เส้นผ่านศูนย์กลาง", "ความยาว", "ความหนา"], correct: 1, note: "สัญลักษณ์แทน Diameter (เส้นผ่านศูนย์กลาง)" },
        { q: "สัญลักษณ์ R10 หมายถึงข้อใด", options: ["เส้นผ่านศูนย์กลาง 10", "รัศมี 10", "ระยะห่าง 10", "มุมเอียง 10"], correct: 1, note: "R หมายถึง Radius (รัศมี)" },
        { q: "สัญลักษณ์ □ หน้าตัวเลขบอกขนาดหมายถึงอะไร", options: ["สี่เหลี่ยมผืนผ้า", "สี่เหลี่ยมจัตุรัส", "ความราบ", "ความหนา"], correct: 1, note: "หมายถึงรูปทรงสี่เหลี่ยมจัตุรัส (Square)" },
        { q: "เส้นประ (Hidden line) ใช้สำหรับแสดงสิ่งใดในแบบ", options: ["ขอบรูปที่มองเห็น", "เส้นศูนย์กลาง", "ขอบรูปที่ถูกบัง", "เส้นลายตัด"], correct: 2, note: "ใช้แสดงขอบที่มองไม่เห็นจากมุมมองนั้น" },
        { q: "ความสูงของตัววัตถุในภาพฉายออร์โทกราฟิก สามารถดูได้จากภาพด้านใด", options: ["หน้า - บน", "หน้า - ข้าง", "ข้าง - บน", "บนอย่างเดียว"], correct: 1, note: "ภาพด้านหน้าและด้านข้างจะบอกความสูง (Height)" },
        { q: "ตัวเลขบอกขนาดในแนวตั้ง ควรเขียนหันหัวไปทางทิศใดตามระบบ Aligned", options: ["ทางขวา", "ทางซ้าย", "ข้างบน", "ข้างล่าง"], correct: 1, note: "หันหัวไปทางซ้ายเพื่อให้คนอ่านมองจากด้านขวาของแบบได้" },

        // === หมวด 2: มาตรฐานเส้นและภาพฉาย (ข้อ 21 - 50) ===
        { q: "ในกลุ่มเส้นมาตรฐาน 0.5 มม. การเขียนเส้นประ (Hidden line) ต้องใช้ขนาดเท่าใด", options: ["0.5 มม.", "0.35 มม.", "0.25 มม.", "ขนาดใดก็ได้"], correct: 1, note: "เส้นรองลงมา (บาง) ในกลุ่ม 0.5 คือ 0.35 มม." },
        { q: "ขนาดกระดาษ A4 ตามมาตรฐาน ISO มีขนาดความกว้างและยาวเท่าใด (มม.)", options: ["210 x 297", "297 x 420", "420 x 594", "594 x 840"], correct: 0, note: "ขนาดมาตรฐาน A4 คือ 210 x 297 มม." },
        { q: "การเอียงของตัวอักษรในงานเขียนแบบวิศวกรรมที่เหมาะสมคือข้อใด", options: ["15 องศากับแนวดิ่งเอียงไปด้านหน้า", "75 องศากับแนวดิ่งเอียงไปด้านหลัง", "15 องศากับแนวดิ่งเอียงไปด้านหลัง", "75 องศากับแนวนอนเอียงไปด้านหน้า"], correct: 0, note: "ตัวอักษรเอียงมาตรฐานคือ 15 องศากับแนวดิ่ง" },
        { q: "ถ้าเส้นตรงยาว 50 มม. ใช้มาตราส่วนย่อ 1:5 จะต้องเขียนลงในแบบยาวเท่าใด", options: ["250 มม.", "25 มม.", "10 มม.", "5 มม."], correct: 2, note: "50 หาร 5 เท่ากับ 10 มม." },
        { q: "การเขียนเส้นศูนย์กลาง (Center line) ข้อใดถูกต้องที่สุด", options: ["ลากทับเส้นขอบรูป", "ลากยาวเกินขอบรูปเล็กน้อย", "ใช้เส้นเต็มหนา", "ใช้เส้นประ"], correct: 1, note: "ต้องลากให้เลยขอบรูปออกมาเพื่อให้รู้ว่าเป็นแกน" },
        { q: "อุปกรณ์ใดใช้วัดตรวจสอบความยาวและแบ่งเส้นตรงเป็นส่วนย่อยได้แม่นยำที่สุด", options: ["ไม้บรรทัด", "ดีไวเดอร์ (Divider)", "ฉากสามเหลี่ยม", "เพลทโค้ง"], correct: 1, note: "ดีไวเดอร์ใช้สำหรับถ่ายระยะและแบ่งส่วนโดยไม่คลาดเคลื่อน" },
        { q: "ไม้ที (T-Square) มีประโยชน์หลักอย่างไรในงานเขียนแบบบนโต๊ะ", options: ["ใช้เขียนเส้นระดับ", "เป็นฐานรองรับฉากสามเหลี่ยม", "กดกระดาษไม่ให้เคลื่อน", "ถูกทั้งข้อ 1 และ 2"], correct: 3, note: "ใช้เขียนแนวนอนและเป็นฐานให้ไม้ฉาก" },
        { q: "ในการฉายภาพระบบมุมที่ 1 (First Angle Projection) ภาพด้านบน (Top view) จะวางไว้ที่ใด", options: ["วางไว้เหนือภาพด้านหน้า", "วางไว้ใต้ภาพด้านหน้า", "วางไว้ทางซ้ายของภาพด้านหน้า", "วางไว้ทางขวาของภาพด้านหน้า"], correct: 1, note: "ระบบมุมที่ 1: มองบน วางล่าง" },
        { q: "สัญลักษณ์รูปกรวยตัดกับวงกลมโดยวงกลมอยู่ทางขวามือของกรวย คือการฉายภาพระบบใด", options: ["ระบบมุมที่ 1", "ระบบมุมที่ 2", "ระบบมุมที่ 3", "ระบบมุมที่ 4"], correct: 0, note: "สัญลักษณ์ First Angle คือวงกลมอยู่ด้านขวา" },

        { q: "ภาพฉาย Pictorial ชนิดใดที่เขียนง่ายที่สุดแต่สัดส่วนเพี้ยนมาก", options: ["Isometric", "Oblique", "Perspective", "Dimetric"], correct: 1, note: "Oblique เขียนง่ายแต่แกนลึกมักเพี้ยน" },
        { q: "เลข 10 ในสัญลักษณ์ M10 x 1.5 หมายถึงอะไร", options: ["ระยะพิท", "ความยาว", "เส้นผ่านศูนย์กลางโตนอก", "จำนวนเกลียว"], correct: 2, note: "คือ Nominal Diameter" },
        { q: "คำสั่ง 'Remove All Burrs' ในแบบหมายถึงอะไร", options: ["ให้ชุบแข็ง", "ให้ลบคมที่เกิดจากการแปรรูป", "ให้ทาสี", "ให้ตรวจขนาดอีกครั้ง"], correct: 1, note: "การลบครีบคมหลังงานแมชชีน" },
        { q: "การสวมแบบ Transition Fit คืออะไร", options: ["สวมคลอนเสมอ", "สวมอัดเสมอ", "อาจคลอนหรืออัดก็ได้", "สวมหลวมมาก"], correct: 2, note: "การสวมกึ่งอัดกึ่งคลอน" },
        { q: "เส้นขอบชิ้นงานเดิมที่ถูกตัดออกไปใช้เส้นชนิดใด", options: ["เส้นเต็มหนา", "เส้นประ", "เส้นลูกโซ่บางสองจุด (Phantom)", "เส้นศูนย์กลาง"], correct: 2, note: "ใช้ Phantom line แสดงส่วนที่ถูกเอาออก" },
        { q: "เส้น 'Visible line' ในมาตรฐาน ISO 0.5 Group จะหนากี่มม.", options: ["0.25", "0.35", "0.50", "0.70"], correct: 2, note: "กลุ่มเส้น 0.5 เส้นเต็มหนาคือ 0.5 มม." },
        { q: "มุมรวมของภาพเพอสเปคทีฟ (Perspective) วิ่งเข้าหาจุดที่เรียกว่าอะไร", options: ["Center point", "Vanishing point", "Focus point", "Miter point"], correct: 1, note: "จุดรวมสายตา" },
        { q: "การตรวจสอบแบบ (Checking) ควรทำด้วยดินสอสีใดเพื่อให้เห็นชัดเจน", options: ["สีดำ", "สีเขียว", "สีแดง", "สีน้ำเงิน"], correct: 2, note: "นิยมใช้สีแดงเพื่อมาร์คจุดแก้ไข" },
        { q: "ภาพฉายระบบมุมที่ 1 วัตถุวางอยู่ตำแหน่งใด", options: ["ระหว่างคนมองกับฉาก", "อยู่หลังฉากรับภาพ", "ฉากรับภาพอยู่ระหว่างคนมองกับวัตถุ", "ไม่อยู่บนฉาก"], correct: 0, note: "คนมอง -> วัตถุ -> ฉาก" },
        { q: "Offset Section คือการตัดแบบใด", options: ["ตัดผ่านตรงกลาง", "ตัดหักเลี้ยวตามรายละเอียด", "ตัด 1 ใน 4", "ตัดหมุนออกข้าง"], correct: 1, note: "ระนาบตัดเปลี่ยนทิศทางได้" },
        { q: "ระนาบที่ขนานกับฉากรับภาพจะเห็นเป็นรูปทรงใด", options: ["ขนาดจริง (True Shape)", "ขนาดเล็กลง", "เห็นเป็นเส้น", "ไม่ปรากฏ"], correct: 0, note: "เห็นรูปร่างและขนาดที่แท้จริง" },
        { q: "ระนาบที่ตั้งฉากกับฉากรับภาพจะเห็นเป็นรูปทรงใด", options: ["ขนาดจริง", "ขนาดเล็กลง", "เห็นเป็นเส้น (Edge View)", "เห็นเป็นจุด"], correct: 2, note: "เห็นเพียงเส้นตรงเส้นเดียว" },
        { q: "สัญลักษณ์ ⌀10 Depth 15 หมายถึงรูเจาะลักษณะใด", options: ["รูทะลุ", "รูไม่ทะลุลึก 15 มม.", "รูคว้านปาก", "รูเกลียว"], correct: 1, note: "Blind hole ลึก 15 มม." },
        { q: "สัญลักษณ์ 'S' หน้าตัวเลขบอกขนาด (เช่น S⌀20) หมายถึงอะไร", options: ["Small", "Surface", "Spherical", "Symmetry"], correct: 2, note: "ใช้กับทรงกลม" },
        { q: "เส้น 'Break line' สำหรับงานท่อทรงกระบอกนิยมเขียนเป็นรูปใด", options: ["เส้นหยักตรง", "เส้นรูปตัว S", "เส้นประ", "เส้นลูกโซ่"], correct: 1, note: "S-Break สำหรับชิ้นงานกลม" },
        { q: "ภาพประกอบ (Assembly) ควรมีสิ่งใดที่ภาพชิ้นส่วน (Detail) ไม่มี", options: ["ขนาดทุกจุด", "พิกัดงานสวม", "รายการชิ้นส่วน (Parts List)", "มาตราส่วน"], correct: 2, note: "ต้องมี BOM หรือรายการชิ้นส่วน" },
        { q: "การฉายภาพระบบมุมที่ 1 วงกลมอยู่ทางขวา กรวยอยู่ซ้าย (ฐานกว้างอยู่ซ้าย) ข้อใดถูก", options: ["ถูก", "ผิด", "สลับกัน", "ไม่แน่นอน"], correct: 0, note: "นี่คือสัญลักษณ์ที่ถูกต้องของ First Angle" },
        { q: "ส่วนใดของ Title block ที่ใช้บอกสถานะการแก้ไขแบบ", options: ["Drawn by", "Approved by", "Revision Column", "Scale"], correct: 2, note: "ช่อง Revision" },
        { q: "การตรวจสอบแบบขั้นสุดท้ายก่อนนำไปใช้งานเรียกว่าอะไร", options: ["Drafting", "Checking", "Sketching", "Modeling"], correct: 1, note: "Checking คือการตรวจความถูกต้อง" }
    ];

    let current = 0;
    let score = 0;
    let answered = new Array(rawQuestions.length).fill(null);
    let allQuestions = [];

    // ฟังก์ชันสลับลำดับช้อยส์แต่รักษาเฉลยให้ถูกตำแหน่ง
    function shuffleOptions() {
        allQuestions = rawQuestions.map(item => {
            const optionsWithMeta = item.options.map((opt, index) => ({
                text: opt,
                isCorrect: index === item.correct
            }));
            
            for (let i = optionsWithMeta.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [optionsWithMeta[i], optionsWithMeta[j]] = [optionsWithMeta[j], optionsWithMeta[i]];
            }

            return {
                q: item.q,
                options: optionsWithMeta.map(o => o.text),
                correct: optionsWithMeta.findIndex(o => o.isCorrect),
                note: item.note
            };
        });
    }

    function render() {
        const q = allQuestions[current];
        document.getElementById('q-count').innerText = `ข้อที่ ${current + 1} / ${allQuestions.length}`;
        document.getElementById('score-count').innerText = `คะแนน: ${score}`;
        document.getElementById('question-text').innerText = q.q;
        document.getElementById('progress-fill').style.width = ((current + 1) / allQuestions.length * 100) + '%';
        
        const container = document.getElementById('options-container');
        const exp = document.getElementById('explanation');
        container.innerHTML = '';
        exp.style.display = 'none';

        q.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;

            if (answered[current] !== null) {
                btn.classList.add('disabled');
                if (i === q.correct) btn.classList.add('correct');
                if (i === answered[current] && i !== q.correct) btn.classList.add('wrong');
                
                exp.style.display = 'block';
                exp.innerHTML = `<strong>คำอธิบายเฉลย:</strong> ${q.note}`;
            }

            btn.onclick = () => {
                if (answered[current] === null) {
                    answered[current] = i;
                    if (i === q.correct) score++;
                    render();
                }
            };
            container.appendChild(btn);
        });

        document.getElementById('prev-btn').disabled = current === 0;
        document.getElementById('next-btn').innerText = current === allQuestions.length - 1 ? 'ดูคะแนนสรุป' : 'ถัดไป';
    }

    function changeQ(step) {
        if (current + step >= 0 && current + step < allQuestions.length) {
            current += step;
            render();
        } else if (current + step === allQuestions.length) {
            alert("จบการทดสอบแล้ว! คะแนนรวมของคุณคือ: " + score + " / " + allQuestions.length);
        }
    }

    shuffleOptions();
    render();
</script>

</body>
</html>
