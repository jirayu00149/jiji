<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engineering Drawing Quiz - 100 Questions</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #64748b;
            --success: #22c55e;
            --danger: #ef4444;
            --bg: #f1f5f9;
            --card: #ffffff;
        }

        body {
            font-family: 'Chakra Petch', sans-serif;
            background-color: var(--bg);
            color: #1e293b;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container { max-width: 800px; width: 100%; }

        .header { text-align: center; margin-bottom: 20px; }

        .card {
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .question-text {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .options-grid { display: grid; gap: 12px; }

        .option-btn {
            padding: 18px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
            text-align: left;
            font-size: 1.05rem;
            font-family: inherit;
        }

        .option-btn:hover:not(.disabled) {
            border-color: var(--primary);
            background-color: #f8fafc;
        }

        .option-btn.correct {
            background-color: #dcfce7 !important;
            border-color: var(--success) !important;
            color: #166534;
            font-weight: 600;
        }

        .option-btn.wrong {
            background-color: #fee2e2 !important;
            border-color: var(--danger) !important;
            color: #991b1b;
        }

        .option-btn.disabled { cursor: default; pointer-events: none; }

        .explanation {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            background-color: #eff6ff;
            border-left: 5px solid var(--primary);
            display: none;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
        }

        .btn-nav {
            padding: 12px 28px;
            border-radius: 10px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
        }

        .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e2e8f0;
            border-radius: 5px;
            margin-bottom: 10px;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
        }

        .status {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            color: var(--secondary);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Engineering Drawing Quiz</h1>
        <p>โหมดเรียนรู้: เฉลยทันที & สลับช้อยส์ (100 ข้อ)</p>
    </div>

    <div class="status">
        <span id="q-count">ข้อที่ 1 / 100</span>
        <span id="score-count">คะแนน: 0</span>
    </div>
    <div class="progress-bar"><div id="progress-fill"></div></div>

    <div class="card">
        <div id="question-text" class="question-text">กำลังโหลดโจทย์...</div>
        <div id="options-container" class="options-grid"></div>
        <div id="explanation" class="explanation"></div>

        <div class="controls">
            <button id="prev-btn" class="btn-nav" onclick="changeQ(-1)" disabled>ก่อนหน้า</button>
            <button id="next-btn" class="btn-nav" onclick="changeQ(1)">ถัดไป</button>
        </div>
    </div>
</div>

<script>
    // ข้อมูลดิบ
    const allQuestions = [
    // หมวด 1: พื้นฐานและการสเก็ตภาพ (อ้างอิงหน้า 1-3)
    { q: "ข้อใดไม่ถูกต้องของการเขียนแบบด้วยมือเปล่า (Freehand Sketching)", options: ["ใช้เครื่องมือน้อย", "เขียนได้อย่างรวดเร็ว", "ได้มาตราส่วนที่แน่นอน", "สื่อสารแนวคิดได้ดี"], correct: 2 },
    { q: "การเขียนเส้นตรงด้วยมือเปล่าให้ตรง มีหลักการอย่างไร", options: ["สายตามองตามปลายดินสอ", "แบ่งเส้นลากเป็นเส้นสั้นๆ ต่อกัน", "ลากอย่างช้าๆ จับดินสอให้แน่น", "จุดเริ่มและจุดจบแล้วสายตามองที่จุดหมาย"], correct: 2 },
    { q: "วัตถุประสงค์หลักของการสเก็ตภาพคือข้อใด", options: ["เพื่อให้ได้ภาพสวยงาม", "เพื่อให้ได้ขนาดถูกต้อง", "เพื่อนำเสนอแนวคิดได้อย่างรวดเร็ว", "เพื่อให้เส้นคมชัด"], correct: 2 },
    { q: "สิ่งที่สำคัญที่สุดในการสเก็ตภาพคือข้อใด", options: ["ต้องได้สเกลที่ถูกต้อง", "ต้องให้ได้ความสวยงาม", "ต้องเขียนให้ได้อย่างรวดเร็ว", "ต้องใช้ดินสอ 2B เท่านั้น"], correct: 2 },
    { q: "เครื่องมือพื้นฐานที่ใช้ในการสเก็ตภาพ คือข้อใด", options: ["ดินสอ, ไม้บรรทัด, ยางลบ", "ดินสอ, กระดาษ, ยางลบ", "ดินสอ, ไม้บรรทัด, วงเวียน", "ดินสอ, วงเวียน, ไม้บรรทัด"], correct: 1 },
    { q: "วัตถุประสงค์ในการใช้กระดาษตาราง (Grid) สำหรับสเก็ตคือข้อใด", options: ["เพื่อให้ได้สัดส่วน", "เพื่อให้สเกลที่ถูกต้อง", "เพื่อให้ได้เส้นตรง", "เพื่อให้เขียนรูปสี่เหลี่ยมง่ายขึ้น"], correct: 0 },
    { q: "ข้อดีของการสเก็ตภาพเมื่อเทียบกับเครื่องมือคือข้อใด", options: ["ได้ขนาดที่ถูกต้อง", "ไม่ต้องมีทักษะมากนัก", "ใช้เพียงดินสอและกระดาษ", "แบบที่ได้สวยงามกว่า"], correct: 2 },
    { q: "ตารางรายการแบบ (Title Block) ควรวางไว้ตำแหน่งใด", options: ["ด้านล่างขวามือ", "ด้านล่างซ้ายมือ", "ด้านล่างตรงกลาง", "มุมบนขวา"], correct: 0 },
    { q: "เกลียวเมตริก M12 x 1.75 ตัวเลข 1.75 หมายถึงค่าใด", options: ["ความยาวเกลียว", "เส้นผ่านศูนย์กลาง", "ระยะพิท (Pitch)", "จำนวนเกลียวต่อนิ้ว"], correct: 2 },
    { q: "ประโยชน์หลักของการเขียนภาพช่วย (Auxiliary view) คือข้อใด", options: ["แสดงเส้นที่มองไม่เห็น", "แสดงรูปร่างจริงของพื้นผิวเอียง", "แสดงภาพลายตัด", "เขียนแทนภาพด้านหน้า"], correct: 1 },

    // หมวด 2: มาตรฐานเส้นและอุปกรณ์ (อ้างอิงหน้า 10-15)
    { q: "เส้นแบบใดใช้บอกศูนย์กลางของวงกลม", options: ["เส้นเต็มบาง", "เส้นประ", "เส้นลูกโซ่บาง", "เส้นเต็มหนา"], correct: 2 },
    { q: "อัตราส่วน (Scale) 1:3 หมายถึงข้อใด", options: ["ภาพใหญ่กว่าจริง 3 เท่า", "ภาพเล็กกว่าจริง 3 เท่า", "ระบุขนาดใหญ่กว่าจริง", "ระบุขนาดเล็กกว่าจริง"], correct: 1 },
    { q: "เส้นเต็มบาง (Continuous thin line) ใช้ในกรณีใด", options: ["เส้นขอบที่เห็นชัด", "เส้นขอบที่ถูกบัง", "เส้นลายตัด", "เส้นผ่านศูนย์กลาง"], correct: 2 },
    { q: "ในกลุ่มเส้น 0.5 มม. เส้นประ (ขอบที่ถูกบัง) ต้องใช้ขนาดเส้นเท่าใด", options: ["0.5 มม.", "0.35 มม.", "0.25 มม.", "ขนาดใดก็ได้"], correct: 1 },
    { q: "ขนาดกระดาษ A4 มีขนาดกว้างxยาวเท่าใด (มม.)", options: ["210 x 297", "297 x 420", "420 x 594", "594 x 840"], correct: 0 },
    { q: "การเขียนเส้นผ่านศูนย์กลางวงกลมควรใช้เส้นชนิดใด", options: ["เส้นเต็มหนัก", "เส้นเต็มบาง", "เส้นศูนย์กลางเล็ก", "เส้นศูนย์กลางใหญ่"], correct: 2 },
    { q: "การเอียงของตัวอักษรที่เหมาะสมคือข้อใด", options: ["15 องศากับแนวดิ่งเอียงหน้า", "75 องศากับแนวดิ่งเอียงหลัง", "15 องศากับแนวดิ่งเอียงหลัง", "75 องศากับแนวนอนเอียงหน้า"], correct: 0 },
    { q: "ถ้าอักษร 'K' สูง 10 มม. อักษรตัวเล็ก 'ing' จะสูงเท่าใด", options: ["7 มม.", "5 มม.", "3 มม.", "2.5 มม."], correct: 0 },
    { q: "ดินสอเบอร์ใดมีไส้ดินสอแข็งที่สุด", options: ["3H", "HB", "B", "2B"], correct: 0 },
    { q: "กระดาษขนาด A4 มีพื้นที่เป็นกี่เท่าของ A1", options: ["1/8", "1/4", "4", "8"], correct: 0 },

    // หมวด 3: การประยุกต์และเรขาคณิต (อ้างอิงหน้า 14-27)
    { q: "ข้อใดไม่ใช่มาตรฐานสากลในงานเขียนแบบ", options: ["มอก.", "ISO", "AISI", "ASHRAE"], correct: 3 },
    { q: "เส้นใดที่ต้องลงน้ำหนักให้หนาและเข้มที่สุด", options: ["Visible line", "Hidden line", "Center line", "Dimension line"], correct: 0 },
    { q: "อุปกรณ์ใดใช้วัดตรวจสอบและแบ่งเส้นตรงเป็นส่วนย่อยได้", options: ["ไม้บรรทัด", "ดีไวเดอร์", "เซ็ทสามเหลี่ยม", "เพลทโค้ง"], correct: 1 },
    { q: "ไม้ที (T-Square) มีประโยชน์หลักคือข้อใด", options: ["เขียนเส้นระดับ", "กดกระดาษไม่ให้เคลื่อน", "เป็นฐานรองรับฉากสามเหลี่ยม", "ถูกทั้งข้อ 1 และ 3"], correct: 3 },
    { q: "ไส้ดินสอเบอร์ใดมีความเข้มน้อยที่สุด", options: ["2B", "HB", "4H", "F"], correct: 2 },
    { q: "กระดาษ A3 มีพื้นที่เป็นกี่เท่าของ A4", options: ["1 เท่า", "2 เท่า", "3 เท่า", "4 เท่า"], correct: 1 },
    { q: "มาตราส่วน 1:500 จัดเป็นมาตราส่วนชนิดใด", options: ["มาตราส่วนย่อ", "มาตราส่วนขยาย", "มาตราส่วนเท่าจริง", "ไม่ใช่มาตราส่วนมาตรฐาน"], correct: 0 },
    { q: "เส้นเต็มบางหยักด้วยมือเปล่า (Break line) ใช้เพื่ออะไร", options: ["แสดงลายตัด", "แสดงขอบชิ้นงานที่มองเห็น", "แสดงรอยตัดย่นระยะ", "แสดงเส้นช่วยบอกขนาด"], correct: 2 },
    { q: "การระบุขนาดความสูงตัวอักษรมาตรฐาน ข้อใดไม่ใช่ค่ามาตรฐาน", options: ["2.5 มม.", "3.0 มม.", "3.5 มม.", "7.0 มม."], correct: 1 },
    { q: "การเขียนแบบหน้าแปลนเมื่อรูปร่างสมมาตร นิยมเขียนแบบใด", options: ["เขียนเต็มภาพ", "เขียนย่อส่วน", "เขียนเพียงครึ่งภาพ", "ไม่ต้องเขียนภาพด้านหน้า"], correct: 2 },

    // หมวด 4: การให้ขนาดและภาพฉาย (อ้างอิงหน้า 25-45)
    { q: "เส้นลูกโซ่บาง 'ไม่ใช้' แสดงเส้นอะไร", options: ["เส้นศูนย์กลาง", "วงกลมตัดบางส่วน", "เส้นตัดเลื่อนแนว", "อ้างอิงการแปรรูป"], correct: 2 },
    { q: "เส้นทะแยงมุมในรูปสี่เหลี่ยมเพื่อแสดง 'พื้นราบ' ใช้เส้นชนิดใด", options: ["เส้นเต็มหนา", "เส้นลูกโซ่หนา", "เส้นเต็มบาง", "เส้นประ"], correct: 2 },
    { q: "มาตราส่วน 5:1 เป็นมาตราส่วนประเภทใด", options: ["มาตราส่วนย่อ", "มาตราส่วนขยาย", "มาตราส่วนเท่าจริง", "ไม่ใช่มาตราส่วนมาตรฐาน"], correct: 1 },
    { q: "การวัดขนาดความยาวตามมาตรฐาน ISO ใช้ระบบหน่วยใด", options: ["อังกฤษ", "ตะวันตก", "เมตริก", "องศา"], correct: 2 },
    { q: "สัญลักษณ์ภาพฉายมุมที่ 1 (First Angle) คือข้อใด", options: ["วงกลมอยู่ซ้ายกรวย", "วงกลมอยู่ขวากรวย", "สี่เหลี่ยมในวงกลม", "กรวยอยู่บนวงกลม"], correct: 1 },
    { q: "การฉายภาพแบบใดที่มีจุดรวมสายตาเพียงจุดเดียว", options: ["มุมที่ 1", "มุมที่ 3", "ไอโซเมตริก", "เพอสเปคทีฟ"], correct: 3 },
    { q: "ระนาบที่มองเห็นเป็นสันในภาพฉายเรียกว่าอะไร", options: ["Edge View", "True Shape", "Foreshortened", "Intersection"], correct: 0 },
    { q: "ระบบมุมที่ 1 วางภาพแบบใด", options: ["มองซ้ายวางซ้าย", "มองบนวางบน", "คนมอง-วัตถุ-ฉากรับภาพ", "คนมอง-ฉากรับภาพ-วัตถุ"], correct: 2 },
    { q: "ความสูงของวัตถุสามารถดูได้จากภาพด้านใด", options: ["หน้า-บน", "หน้า-ข้าง", "ข้าง-บน", "บนอย่างเดียว"], correct: 1 },
    { q: "เส้น Miter Line ในการถ่ายขนาดต้องทำมุมกี่องศา", options: ["30", "45", "60", "90"], correct: 1 },

    // หมวด 5: ภาพตัดและงานสวม (อ้างอิงหน้า 404-440)
    { q: "เส้นลายตัด (Section Line) โดยปกติให้เอียงกี่องศา", options: ["15", "30", "45", "90"], correct: 2 },
    { q: "ภาพตัดประเภทใดเหมาะสำหรับชิ้นงานที่สมมาตร", options: ["ตัดเต็ม", "ตัดครึ่ง (Half Section)", "ตัดเฉพาะจุด", "ตัดหมุน"], correct: 1 },
    { q: "ภาพตัดที่แสดงการผ่าครึ่งชิ้นงานออกเป็นสองส่วนเท่ากันเรียกว่าอะไร", options: ["Full Section", "Half Section", "Offset Section", "Broken-out"], correct: 0 },
    { q: "การตัดเฉพาะส่วน (Broken-out Section) แสดงด้วยเส้นอะไร", options: ["เส้นเต็มบาง", "เส้นมือเปล่าบาง", "เส้นลูกโซ่หนา", "เส้นประ"], correct: 1 },
    { q: "เส้นลายตัด (Section line) เขียนด้วยเส้นชนิดใด", options: ["เส้นเต็มหนา", "เส้นลูกโซ่บาง", "เส้นประบาง", "เส้นเต็มบาง"], correct: 3 },
    { q: "ชิ้นส่วนใดที่ 'ยกเว้น' ไม่ต้องเขียนลายตัดแม้จะถูกตัดผ่าน", options: ["เสื้อสูบ", "เพลาตัน/สลักเกลียว", "ฝาครอบ", "ฐานเครื่อง"], correct: 1 },
    { q: "สัญลักษณ์ H7 ในงานสวม ตัวอักษรพิมพ์ใหญ่ 'H' หมายถึงอะไร", options: ["ตำแหน่งงานสวมของรู", "ตำแหน่งงานสวมของเพลา", "ค่าความแข็ง", "ขนาดโตสุด"], correct: 0 },
    { q: "การสวมที่เพลาใหญ่กว่ารูเสมอเรียกว่าอะไร", options: ["สวมคลอน", "สวมพอดี", "สวมอัด", "สวมหลวม"], correct: 2 },
    { q: "สัญลักษณ์ Ra 3.2 หมายถึงค่าใด", options: ["ความหนาผิว", "ความขรุขระเฉลี่ยของผิว", "รัศมีส่วนโค้ง", "ระยะห่างรู"], correct: 1 },
    { q: "ภาพระเบิด (Exploded View) มีประโยชน์หลักอย่างไร", options: ["ประหยัดเนื้อที่", "แสดงลำดับการประกอบ", "แสดงขนาดจริง", "แสดงลายตัด"], correct: 1 },

    let current = 0;
    let score = 0;
    let answered = new Array(rawQuestions.length).fill(null);
    let allQuestions = [];

    // ฟังก์ชันสลับลำดับช้อยส์แต่คงเฉลยไว้ให้ถูก
    function shuffleOptions() {
        allQuestions = rawQuestions.map(item => {
            const optionsWithMeta = item.options.map((opt, index) => ({
                text: opt,
                isCorrect: index === item.correct
            }));
            
            // สุ่มลำดับช้อยส์
            for (let i = optionsWithMeta.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [optionsWithMeta[i], optionsWithMeta[j]] = [optionsWithMeta[j], optionsWithMeta[i]];
            }

            return {
                q: item.q,
                options: optionsWithMeta.map(o => o.text),
                correct: optionsWithMeta.findIndex(o => o.isCorrect)
            };
        });
    }

    function render() {
        const q = allQuestions[current];
        document.getElementById('q-count').innerText = `ข้อที่ ${current + 1} / ${allQuestions.length}`;
        document.getElementById('score-count').innerText = `คะแนน: ${score}`;
        document.getElementById('question-text').innerText = q.q;
        document.getElementById('progress-fill').style.width = ((current + 1) / allQuestions.length * 100) + '%';
        
        const container = document.getElementById('options-container');
        const exp = document.getElementById('explanation');
        container.innerHTML = '';
        exp.style.display = 'none';

        q.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;

            if (answered[current] !== null) {
                btn.classList.add('disabled');
                if (i === q.correct) btn.classList.add('correct');
                if (i === answered[current] && i !== q.correct) btn.classList.add('wrong');
                
                exp.style.display = 'block';
                exp.innerHTML = `<strong>เฉลย:</strong> ${q.options[q.correct]}`;
            }

            btn.onclick = () => {
                if (answered[current] === null) {
                    answered[current] = i;
                    if (i === q.correct) score++;
                    render();
                }
            };
            container.appendChild(btn);
        });

        document.getElementById('prev-btn').disabled = current === 0;
        document.getElementById('next-btn').innerText = current === allQuestions.length - 1 ? 'ดูคะแนนสรุป' : 'ถัดไป';
    }

    function changeQ(step) {
        if (current + step >= 0 && current + step < allQuestions.length) {
            current += step;
            render();
        } else if (current + step === allQuestions.length) {
            alert("จบการทดสอบแล้ว! คะแนนรวมของคุณคือ: " + score + " / " + allQuestions.length);
        }
    }

    // เริ่มต้นสุ่มช้อยส์และแสดงผล
    shuffleOptions();
    render();
</script>
