<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engineering Drawing Quiz - 100 Questions (COE Standard)</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #64748b;
            --success: #22c55e;
            --danger: #ef4444;
            --bg: #f1f5f9;
            --card: #ffffff;
        }

        body {
            font-family: 'Chakra Petch', sans-serif;
            background-color: var(--bg);
            color: #1e293b;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container { max-width: 800px; width: 100%; }

        .header { text-align: center; margin-bottom: 20px; }

        .card {
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .question-text {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .options-grid { display: grid; gap: 12px; }

        .option-btn {
            padding: 18px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
            text-align: left;
            font-size: 1.05rem;
            font-family: inherit;
        }

        .option-btn:hover:not(.disabled) {
            border-color: var(--primary);
            background-color: #f8fafc;
        }

        .option-btn.correct {
            background-color: #dcfce7 !important;
            border-color: var(--success) !important;
            color: #166534;
            font-weight: 600;
        }

        .option-btn.wrong {
            background-color: #fee2e2 !important;
            border-color: var(--danger) !important;
            color: #991b1b;
        }

        .option-btn.disabled { cursor: default; pointer-events: none; }

        .explanation {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            background-color: #eff6ff;
            border-left: 5px solid var(--primary);
            display: none;
            line-height: 1.6;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
        }

        .btn-nav {
            padding: 12px 28px;
            border-radius: 10px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
        }

        .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e2e8f0;
            border-radius: 5px;
            margin-bottom: 10px;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
        }

        .status {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            color: var(--secondary);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Engineering Drawing Quiz</h1>
        <p>อ้างอิงเฉลยสภาวิศวกร (100 ข้อ)</p>
    </div>

    <div class="status">
        <span id="q-count">ข้อที่ 1 / 100</span>
        <span id="score-count">คะแนน: 0</span>
    </div>
    <div class="progress-bar"><div id="progress-fill"></div></div>

    <div class="card">
        <div id="question-text" class="question-text">กำลังโหลดโจทย์...</div>
        <div id="options-container" class="options-grid"></div>
        <div id="explanation" class="explanation"></div>

        <div class="controls">
            <button id="prev-btn" class="btn-nav" onclick="changeQ(-1)" disabled>ก่อนหน้า</button>
            <button id="next-btn" class="btn-nav" onclick="changeQ(1)">ถัดไป</button>
        </div>
    </div>
</div>

<script>
    // ข้อมูลดิบ 100 ข้อ ตรวจสอบเฉลยตามการขีดเส้นใต้ในไฟล์ PDF Engineering Drawings
    const rawQuestions = [
        // หมวด 1: พื้นฐานและการสเก็ตภาพ (ข้อ 1-10)
        { q: "ข้อใดไม่ถูกต้องของการเขียนแบบด้วยมือเปล่า (Freehand Sketching)", options: ["ใช้เครื่องมือและอุปกรณ์ในการเขียนแบบน้อย", "เขียนได้อย่างรวดเร็ว", "ได้มาตราส่วนที่แน่นอน", "ไม่ถูกต้องมากกว่า 1 ข้อ"], correct: 2, note: "การสเก็ตภาพเน้นความรวดเร็วและการสื่อสารแนวคิด ไม่สามารถให้มาตราส่วน (Scale) ที่แม่นยำแน่นอนเหมือนการใช้เครื่องมือวัด" },
        { q: "การเขียนเส้นตรงด้วยมือเปล่าให้ตรง มีหลักในการลากอย่างไร", options: ["ให้สายตามองตามดินสออยู่ตลอดเวลา", "แบ่งเส้นลากเป็นเส้นสั้นๆ ต่อกัน", "ลากอย่างช้าๆ จับดินสอให้แน่น", "ถูกทั้งข้อที่ 2. และ ข้อที่ 3."], correct: 1, note: "เทคนิคการสเก็ตเส้นตรงที่ถูกต้องคือลากเป็นช่วงสั้นๆ ต่อเนื่องกัน เพื่อให้ควบคุมทิศทางได้ง่ายกว่าการลากยาวครั้งเดียว" },
        { q: "วัตถุประสงค์ของการสเก็ตภาพคือข้อใด", options: ["เพื่อให้ได้ภาพที่สวยงาม", "เพื่อให้ได้ขนาดที่ถูกต้อง", "เพื่อนำเสนอแนวความคิดต่อผู้อื่นได้อย่างรวดเร็ว", "เพื่อให้เส้นมีความคมชัด"], correct: 2, note: "หัวใจสำคัญของการสเก็ตคือ 'Speed' ในการบันทึกหรือถ่ายทอดไอเดียทางวิศวกรรมให้ผู้อื่นเข้าใจได้ทันที" },
        { q: "ข้อใดคือสิ่งที่สำคัญที่สุดในการสเก็ตภาพ", options: ["ต้องได้สเกลที่ถูกต้อง", "ต้องให้ได้ความสวยงาม", "ต้องเขียนให้ได้อย่างรวดเร็ว", "ต้องใช้ดินสอ 2B เท่านั้น"], correct: 2, note: "ในการทำงานหน้างานหรือการประชุมออกแบบ ความเร็วในการสื่อสารแนวคิดสำคัญกว่าความละเอียดประณีตของภาพ" },
        { q: "อุปกรณ์พื้นฐานที่ใช้ในการสเก็ตภาพ คือข้อใด", options: ["ดินสอ, ไม้บรรทัด, ยางลบ", "ดินสอ, กระดาษ, ยางลบ", "ดินสอ, ไม้บรรทัด, วงเวียน", "ดินสอ, วงเวียน, ไม้บรรทัด"], correct: 1, note: "การสเก็ตมือเปล่า (Freehand) ใช้เพียงดินสอและกระดาษเท่านั้น หากใช้ไม้บรรทัดจะถือว่าไม่ใช่การสเก็ตมือเปล่า" },
        { q: "วัตถุประสงค์ในการใช้กระดาษตาราง (Grid paper) สำหรับการสเก็ตภาพคือข้อใด", options: ["เพื่อให้ได้สัดส่วนของภาพที่ถูกต้อง", "เพื่อให้ได้สเกลที่ถูกต้อง", "เพื่อให้ได้เส้นที่ตรง", "เพื่อให้เขียนรูปสี่เหลี่ยมได้ง่ายขึ้น"], correct: 0, note: "เส้นตารางช่วยให้เรากะระยะสัดส่วน (Proportion) ของภาพฉายแต่ละด้านให้สัมพันธ์กันได้ง่ายและถูกต้องตามหลักภาพฉาย" },
        { q: "ข้อดีของการสเก็ตภาพเมื่อเทียบกับการเขียนด้วยเครื่องมือและอุปกรณ์คือข้อใด", options: ["ได้ขนาดที่ถูกต้องแม่นยำ", "ไม่ต้องมีทักษะในการเขียนมากนัก", "ใช้เพียงดินสอและกระดาษก็สามารถทำงานได้", "แบบที่ได้จะสวยงามกว่า"], correct: 2, note: "ความสะดวกและประหยัดเวลาเป็นข้อดีหลัก เพราะสามารถเริ่มทำงานได้ทันทีโดยไม่ต้องตั้งโต๊ะเขียนแบบ" },
        { q: "มาตราส่วน (Scale) 1:2 จัดเป็นมาตราส่วนประเภทใด", options: ["มาตราส่วนขยาย", "มาตราส่วนเท่าจริง", "มาตราส่วนย่อ", "มาตราส่วนผิดปกติ"], correct: 2, note: "1:2 คือมาตราส่วนย่อ (Reduction Scale) โดย 1 ส่วนในกระดาษมีค่าเท่ากับ 2 ส่วนของจริง" },
        { q: "สัญลักษณ์ ⌀ ที่วางไว้หน้าตัวเลขในการบอกขนาดหมายถึงค่าใด", options: ["รัศมี", "เส้นผ่านศูนย์กลาง", "ความยาว", "ความหนา"], correct: 1, note: "สัญลักษณ์ ⌀ (Diameter) ตามมาตรฐานสากลใช้สำหรับระบุความโตของรูกลมหรือวัตถุทรงกระบอก" },
        { q: "เส้นประ (Hidden line) ใช้สำหรับแสดงสิ่งใดในแบบ", options: ["ขอบรูปที่มองเห็น", "เส้นศูนย์กลาง", "ขอบรูปที่ถูกบัง", "เส้นลายตัด"], correct: 2, note: "เส้นประ (Dashed Line) ใช้แสดงรายละเอียดหรือขอบงานที่ถูกเนื้อวัตถุส่วนอื่นบังอยู่ ไม่สามารถมองเห็นได้จากมุมนั้น" },

        // หมวด 2: มาตรฐานเส้นและอุปกรณ์ (ข้อ 11-20)
        { q: "เส้นเต็มหนา (Continuous thick line) ตามมาตรฐานใช้เป็นเส้นชนิดใด", options: ["เส้นร่าง", "เส้นช่วยบอกขนาด", "เส้นขอบรูปที่มองเห็น", "เส้นประ"], correct: 2, note: "เส้นเต็มหนา (Visible line) คือเส้นที่สำคัญที่สุด ใช้สำหรับเน้นขอบเขตของชิ้นงานที่มองเห็นได้ชัดเจน" },
        { q: "ในการฉายภาพระบบมุมที่ 1 (First Angle Projection) ภาพด้านบน (Top view) จะวางไว้ที่ใด", options: ["วางไว้เหนือภาพด้านหน้า", "วางไว้ใต้ภาพด้านหน้า", "วางไว้ทางซ้ายของภาพด้านหน้า", "วางไว้ทางขวาของภาพด้านหน้า"], correct: 1, note: "ระบบมุมที่ 1 (มาตรฐานไทย/ยุโรป) ใช้หลักการ 'มองด้านไหนวางด้านตรงข้าม' มองด้านบนจึงวางภาพไว้ใต้ภาพด้านหน้า" },
        { q: "สัญลักษณ์รูปกรวยตัดกับวงกลมโดยวงกลมอยู่ทางขวามือของกรวย คือการฉายภาพระบบใด", options: ["ระบบมุมที่ 1", "ระบบมุมที่ 2", "ระบบมุมที่ 3", "ระบบมุมที่ 4"], correct: 0, note: "วงกลมขวากรวยเป็นสัญลักษณ์สากลของระบบมุมที่ 1 (First Angle Projection)" },
        { q: "เส้นลายตัด (Section line) นิยมเขียนเอียงทำมุมเท่าใดกับแนวระดับ", options: ["15 องศา", "30 องศา", "45 องศา", "90 องศา"], correct: 2, note: "มุม 45 องศาเป็นมุมมาตรฐานที่ช่วยให้เส้นลายตัดตัดกับเส้นขอบรูปส่วนใหญ่ได้อย่างชัดเจน" },
        { q: "ชิ้นส่วนใดที่ไม่ต้องเขียนลายตัดแม้จะถูกตัดผ่านในแบบประกอบ", options: ["เสื้อสูบ", "เพลา (Shaft)", "ฝาครอบ", "ฐานเครื่อง"], correct: 1, note: "ชิ้นส่วนมาตรฐานที่เป็นของตัน (Solid parts) เช่น เพลา, สลักเกลียว, หมุดย้ำ จะไม่เขียนลายตัดตามแนวแกนเพื่อความชัดเจน" },
        { q: "ภาพไอโซเมตริก (Isometric) แกนหลักเอียงทำมุมกี่องศากับแนวระดับ", options: ["15 องศา", "30 องศา", "45 องศา", "60 องศา"], correct: 1, note: "แกนหลักของภาพ Isometric จะเอียงทำมุม 30 องศากับแนวนอนทั้งสองด้าน เพื่อให้เห็นขนาดจริงของชิ้นงานทั้ง 3 ด้าน" },
        { q: "สัญลักษณ์ R10 หมายถึงข้อใด", options: ["เส้นผ่านศูนย์กลาง 10", "รัศมี 10", "ระยะห่าง 10", "มุมเอียง 10"], correct: 1, note: "R ย่อมาจาก Radius ใช้บอกระยะรัศมีของวงกลมหรือส่วนโค้ง" },
        { q: "สัญลักษณ์ □ หน้าตัวเลขบอกขนาดหมายถึงอะไร", options: ["สี่เหลี่ยมผืนผ้า", "สี่เหลี่ยมจัตุรัส", "ความราบ", "ความหนา"], correct: 1, note: "สัญลักษณ์สี่เหลี่ยมจัตุรัสใช้กำกับตัวเลขเพื่อบอกว่าพื้นที่ส่วนนั้นมีความกว้างและยาวเท่ากัน" },
        { q: "มาตราส่วน 5:1 จัดเป็นมาตราส่วนประเภทใด", options: ["มาตราส่วนย่อ", "มาตราส่วนขยาย", "มาตราส่วนเท่าจริง", "ไม่ใช่มาตราส่วนมาตรฐาน"], correct: 1, note: "มาตราส่วน 5:1 คือมาตราส่วนขยาย (Enlargement Scale) ใช้เขียนชิ้นส่วนขนาดเล็กให้เห็นรายละเอียดชัดเจนขึ้น" },
        { q: "ตัวเลขบอกขนาดในแนวตั้ง ควรเขียนหันหัวไปทางทิศใดตามระบบ Aligned", options: ["ขวา", "ซ้าย", "ข้างบน", "ข้างล่าง"], correct: 1, note: "ตามมาตรฐาน Aligned ตัวเลขในแนวตั้งต้องเขียนให้อ่านได้จากทางด้านขวาของแบบ (หันหัวไปทางซ้าย)" },

        // หมวด 3: รายละเอียดเชิงลึก (ข้อ 21-40)
        { q: "เส้นช่วยบอกขนาด (Extension line) ควรลากเลยหัวลูกศรไปกี่มิลลิเมตร", options: ["0 มม.", "1-2 มม.", "5 มม.", "10 มม."], correct: 1, note: "ลากเลยออกไปเล็กน้อยเพื่อให้ผู้รับแบบแยกแยะระหว่างเส้นช่วยบอกขนาดกับเส้นขอบชิ้นงานได้ชัดเจน" },
        { q: "เกลียว M10 x 1.5 ตัวเลข 10 หมายถึงอะไร", options: ["ความยาวเกลียว", "เส้นผ่านศูนย์กลางโตนอก", "ระยะพิท", "จำนวนเกลียว"], correct: 1, note: "เลขหน้าคูณคือ Nominal Diameter หรือเส้นผ่านศูนย์กลางที่ระบุ (ส่วน 1.5 คือระยะพิท)" },
        { q: "ข้อใดคือมาตราส่วนเท่าจริง", options: ["1:1", "1:2", "2:1", "1:10"], correct: 0, note: "1:1 หมายถึงขนาดในกระดาษเท่ากับขนาดจริงของชิ้นงาน" },
        { q: "ในการเขียนแบบ 'NTS' ย่อมาจากอะไร", options: ["New Technical Standard", "Not To Scale", "No Technical Specification", "National Tolerance Scale"], correct: 1, note: "NTS (Not To Scale) ระบุว่าแบบนั้นไม่ได้เขียนตามมาตราส่วนที่ถูกต้อง" },
        { q: "เส้น Miter Line ใช้ในการถ่ายขนาดจากภาพใดไปภาพใด", options: ["ภาพหน้าไปภาพข้าง", "ภาพหน้าไปภาพบน", "ภาพบนไปภาพข้าง", "ภาพบนไปภาพหน้า"], correct: 2, note: "เส้น Miter line เอียง 45 องศา ใช้สำหรับถ่ายขนาด 'ความลึก' จากภาพบนไปยังภาพข้าง หรือในทางกลับกัน" },
        { q: "ภาพฉายระบบมุมที่ 3 (Third Angle Projection) วางภาพด้านบนไว้ที่ใด", options: ["ใต้ภาพด้านหน้า", "เหนือภาพด้านหน้า", "ซ้ายภาพด้านหน้า", "ขวาภาพด้านหน้า"], correct: 1, note: "ระบบมุมที่ 3 (มาตรฐานอเมริกา/ญี่ปุ่น) ใช้หลักการ 'มองด้านไหนวางด้านนั้น' ภาพด้านบนจึงอยู่เหนือภาพด้านหน้า" },
        { q: "เส้นมือเปล่าบางหยัก (Thin freehand line) ใช้เพื่ออะไร", options: ["แสดงเส้นขอบรูป", "แสดงเส้นศูนย์กลาง", "แสดงรอยตัดย่นระยะ (Break line)", "แสดงลายตัด"], correct: 2, note: "ใช้แสดงขอบเขตของชิ้นงานที่ถูกตัดทอน (Break) เพื่อย่นระยะในกรณีที่ชิ้นงานมีความยาวมากเกินไป" },
        { q: "ความสูงมาตรฐานของตัวอักษรเนื้อความในแบบที่นิยมคือเท่าใด", options: ["1.5 มม.", "2.5 หรือ 3.5 มม.", "7 มม.", "10 มม."], correct: 1, note: "เป็นขนาดความสูงที่อ่านง่ายและเหมาะสมที่สุดสำหรับงานเขียนแบบบนกระดาษมาตรฐาน" },
        { q: "สัญลักษณ์ ⌀10 Depth 15 หมายถึงอะไร", options: ["รูทะลุขนาด 10", "รูไม่ทะลุโต 10 ลึก 15", "รูเกลียวโต 15", "รูลึก 10"], correct: 1, note: "หมายถึงรูเจาะที่ไม่ทะลุ (Blind Hole) โดยมีขนาดโต 10 มม. และเจาะลึกลงไป 15 มม." },
        { q: "สัญลักษณ์ C3 ที่มุมชิ้นงาน หมายถึงการแปรรูปอย่างไร", options: ["ลบมุมโค้งรัศมี 3", "ลบมุมเอียง 45 องศา ขนาด 3 มม.", "ขยายรูโต 3", "ชุบแข็งผิวหน้า"], correct: 1, note: "C ย่อมาจาก Chamfer หรือการลบมุมเอียงเพื่อลดความคมของชิ้นงาน" },
        { q: "ภาพประกอบ (Assembly Drawing) ข้อใดคือ 'Balloon'", options: ["รูปวงกลมที่มีสี", "รูปวงกลมที่มีตัวเลขชิ้นส่วน", "เส้นบอกขนาด", "สัญลักษณ์มุมมอง"], correct: 1, note: "Balloon คือหมายเลขกำกับชิ้นส่วนที่เขียนไว้ในวงกลมเพื่อโยงไปยังตารางรายการชิ้นส่วน" },
        { q: "รายการวัสดุ (Bill of Materials) ควรเริ่มบรรทัดแรกจากจุดใด", options: ["บนลงล่าง", "ล่างขึ้นบน ติดกับ Title block", "ซ้ายไปขวา", "หน้าแยกต่างหาก"], correct: 1, note: "เพื่อความเป็นระเบียบและให้สามารถเพิ่มรายการชิ้นส่วนขึ้นไปทางด้านบนได้หากมีการแก้ไขแบบ" },
        { q: "เกลียวชนิดใดใช้ส่งกำลังได้ดีที่สุดในงานเครื่องจักร", options: ["เกลียวสามเหลี่ยม", "เกลียวสี่เหลี่ยม", "เกลียวกลม", "เกลียวฟันเลื่อย"], correct: 1, note: "เกลียวสี่เหลี่ยม (Square thread) มีประสิทธิภาพในการส่งกำลังสูงที่สุดเพราะไม่มีแรงผลักในแนวรัศมี" },
        { q: "สัญลักษณ์ Ra 3.2 หมายถึงค่าใดของผิวงาน", options: ["ความหนาผิว", "ความขรุขระเฉลี่ยของผิว", "ความแข็งผิว", "ความเงาสะท้อน"], correct: 1, note: "Ra คือค่าเฉลี่ยความสูง-ต่ำของผิวงาน ยิ่งเลขน้อยผิวยิ่งละเอียด" },
        { q: "ภาพตัดย้ายแนว (Offset Section) ใช้เมื่อใด", options: ["เมื่อตัดผ่านตรงกลางชิ้นงาน", "เมื่อต้องการแสดงรายละเอียดที่ไม่เรียงในแนวตรง", "เมื่อตัดชิ้นงานเป็นวงกลม", "เมื่อต้องการแสดงสีชิ้นงาน"], correct: 1, note: "ช่วยให้แสดงรายละเอียดภายในได้หลายจุดในภาพตัดเพียงภาพเดียวโดยการหักเลี้ยวแนวตัด" },
        { q: "ในภาพตัด 'ซีล' หรือ 'ปะเก็น' ที่บางมาก ควรแสดงอย่างไร", options: ["เขียนลายตัดถี่ๆ", "ไม่ต้องเขียนลายตัด", "ระบายดำทึบ", "ใช้เส้นประแทน"], correct: 2, note: "ตามมาตรฐาน ISO ชิ้นส่วนที่บางเกินไปจะระบายดำทึบและเว้นช่องว่างระหว่างชิ้นเล็กน้อย" },
        { q: "สัญลักษณ์ ⨂ ในงานเขียนแบบตำแหน่ง หมายถึงอะไร", options: ["ห้ามเจาะรู", "ตำแหน่งศูนย์กลางที่แน่นอน", "จุดกึ่งกลางแผ่น", "จุดระเบิด"], correct: 1, note: "ระบุตำแหน่งศูนย์กลางที่ต้องการความแม่นยำสูง มักใช้ในงานควบคุมด้วยคอมพิวเตอร์" },
        { q: "การถ่ายขนาดความลึกแบบ Miter line ต้องเอียงเส้นกี่องศา", options: ["30", "45", "60", "90"], correct: 1, note: "มุม 45 องศาจะทำให้ขนาดความลึกจากภาพบนเท่ากับความลึกในภาพข้างพอดี" },
        { q: "ส่วนใดของแบบที่บอกชื่อคนเขียนและชื่อแผ่นงาน", options: ["Header", "Side Note", "Title Block", "Revision Box"], correct: 2, note: "Title Block (ตารางรายการแบบ) คือส่วนรวมข้อมูลสำคัญทางบริหารและเทคนิคของแบบแผ่นนั้น" },
        { q: "ถ้าชิ้นงานยาวมากจนเขียนลงแผ่นไม่ได้ ควรใช้วิธีใด", options: ["ย่อมาตราส่วนให้เล็กมาก", "ใช้เส้น Break line ย่นระยะ", "ใช้กระดาษแผ่นที่ 2 ต่อ", "ไม่ต้องเขียนส่วนที่ยาว"], correct: 1, note: "การย่นระยะ (Breaking) ช่วยให้ยังใช้มาตราส่วนเดิมได้โดยไม่ต้องเพิ่มขนาดกระดาษ" },

        // หมวด 4: สัญลักษณ์และงานสวม (ข้อ 41-60)
        { q: "สัญลักษณ์ภาพฉาย ISO คือรูปทรงใด", options: ["กรวยเต็ม", "กรวยตัดกับวงกลม", "ทรงกระบอก", "ทรงกลม"], correct: 1, note: "ใช้รูปกรวยตัด (Truncated Cone) เพื่อแสดงทิศทางการมองตามหลักการฉายภาพ" },
        { q: "ภาพ Cavalier Oblique ต่างจาก Cabinet Oblique อย่างไร", options: ["มุมที่เอียง", "มาตราส่วนแกนลึก", "ความสูง", "ความสวยงาม"], correct: 1, note: "Cavalier ใช้แกนลึกขนาดจริง (1:1) ส่วน Cabinet ใช้แกนลึกครึ่งเดียว (1:2) เพื่อลดความหลอกตา" },
        { q: "เส้นลูกโซ่หนา (Thick Chain Line) ใช้ระบุข้อมูลใด", options: ["เส้นศูนย์กลาง", "แนวการแปรรูปผิวพิเศษ", "เส้นขอบที่ถูกบัง", "เส้นร่าง"], correct: 1, note: "ใช้แสดงขอบเขตของพื้นผิวที่ต้องทำกระบวนการพิเศษ เช่น การชุบแข็ง (Hardening)" },
        { q: "สัญลักษณ์ 'PCD' ใช้ระบุขนาดของอะไร", options: ["ความกว้างแผ่น", "แนวศูนย์กลางของรูกลุ่มที่เป็นวงกลม", "ความหนาเหล็ก", "รหัสวัสดุ"], correct: 1, note: "PCD (Pitch Circle Diameter) คือเส้นผ่านศูนย์กลางของแนววงกลมที่รูกลุ่มเรียงตัวอยู่" },
        { q: "หน่วยพื้นฐานในงานเขียนแบบวิศวกรรมเครื่องกลไทยคืออะไร", options: ["เซนติเมตร", "นิ้ว", "มิลลิเมตร", "เมตร"], correct: 2, note: "งานอุตสาหกรรมในไทยอิงตามมาตรฐานเมตริก โดยใช้มิลลิเมตรเป็นหน่วยหลัก" },
        { q: "เส้นใดมีความสำคัญลำดับสูงสุดในภาพฉายถ้าเกิดการทับกัน", options: ["เส้นศูนย์กลาง", "เส้นประ", "เส้นขอบรูป", "เส้นช่วยบอกขนาด"], correct: 2, note: "ลำดับความสำคัญ: เส้นขอบรูป > เส้นประ > เส้นศูนย์กลาง > เส้นช่วยบอกขนาด" },
        { q: "สัญลักษณ์หัวลูกศรบอกขนาดตามมาตรฐานควรมีความยาวเป็นกี่เท่าของความกว้าง", options: ["1 เท่า", "2 เท่า", "3 เท่า", "4 เท่า"], correct: 2, note: "สัดส่วนความยาวต่อความกว้าง 3:1 ทำให้หัวลูกศรดูแหลมและชี้จุดได้ชัดเจน" },
        { q: "เกลียวซ้าย (Left-hand thread) ต้องระบุสัญลักษณ์ใดต่อท้าย", options: ["L", "LH", "LT", "LW"], correct: 1, note: "LH (Left Hand) จำเป็นต้องระบุเสมอเพราะเกลียวปกติจะเป็นเกลียวขวา" },
        { q: "ภาพระเบิด (Exploded View) มักพบในงานประเภทใด", options: ["แบบงานผลิตชิ้นเดียว", "แบบแสดงการประกอบและรายการอะไหล่", "แบบงานไฟฟ้า", "แบบงานโยธา"], correct: 1, note: "ใช้แสดงความสัมพันธ์และการประกอบกันของแต่ละชิ้นส่วนในระบบ" },
        { q: "เส้น Phantom Line (ลูกโซ่บางสองจุด) ใช้แสดงข้อมูลใด", options: ["ขอบที่ถูกบัง", "ศูนย์กลางวงกลม", "ตำแหน่งถัดไปของชิ้นส่วนที่เคลื่อนที่", "รอยตัดตอน"], correct: 2, note: "ใช้แสดงตำแหน่งจำกัดของการเคลื่อนที่ (Limit of movement) หรือชิ้นส่วนที่อยู่ใกล้เคียง" },
        { q: "สัญลักษณ์ภาพฉายระบบมุมที่ 1 วงกลมจะอยู่ด้านใดของกรวยตัด", options: ["ด้านซ้าย (ฝั่งฐานกว้าง)", "ด้านขวา (ฝั่งฐานแคบ)", "ด้านบน", "ด้านล่าง"], correct: 1, note: "ใน First Angle วัตถุอยู่หน้าฉากรับภาพ วงกลมจึงอยู่ทางขวาของรูปกรวยตัด" },
        { q: "การลบคม (Deburring) ปกติจะระบุในส่วนใดของแบบ", options: ["ใต้เส้นบอกขนาด", "ในภาพตัด", "ในช่อง Notes หรือ General Specifications", "ไม่ต้องระบุ"], correct: 2, note: "ระบุเป็นข้อกำหนดทั่วไป (General Note) เพื่อความสะอาดและปลอดภัยของชิ้นงานทั้งหมด" },
        { q: "สัญลักษณ์ 'Counterbore' คือรูปทรงใด", options: ["รูปตัว V", "รูปตัว U ก้นแบน", "รูปสี่เหลี่ยม", "รูปวงกลม"], correct: 1, note: "คือการขยายปากรูให้เป็นทรงกระบอกก้นแบนเพื่อซ่อนหัวสลักเกลียว" },
        { q: "สัญลักษณ์ 'Countersink' คือรูเจาะแบบใด", options: ["รูเจาะทะลุ", "รูเจาะขยายปากเป็นมุมเอียง", "รูเจาะเกลียว", "รูคว้านเรียบ"], correct: 1, note: "ขยายปากรูเป็นมุมเฉียง (มักเป็น 90 องศา) เพื่อหลบหัวสกรูหัวฝัง" },
        { q: "ค่า Tolerance 50 +0.02 / -0.01 ขีดจำกัดต่ำสุดคือเท่าใด", options: ["50.02", "50.01", "49.99", "50.00"], correct: 2, note: "ขีดจำกัดต่ำสุด (Lower Limit) คือ 50 - 0.01 = 49.99 มม." },
        { q: "การพับแบบมาตรฐาน ข้อมูล Title block ต้องอยู่ตำแหน่งใด", options: ["ด้านในสุด", "ด้านหน้าสุดที่มองเห็นได้ทันที", "ซ่อนอยู่ด้านหลัง", "พับครึ่ง"], correct: 1, note: "เมื่อพับแบบเสร็จแล้ว Title Block ต้องอยู่หน้าสุดเพื่อให้เจ้าหน้าที่สามารถค้นหาชื่อแบบได้ทันที" },
        { q: "สัญลักษณ์ 'S' หน้าตัวเลขบอกขนาด (เช่น S⌀20) หมายถึงอะไร", options: ["Small", "Surface", "Spherical (ทรงกลม)", "Symmetry"], correct: 2, note: "S มาจาก Spherical ใช้บอกว่าขนาดนั้นเป็นเส้นผ่านศูนย์กลางของทรงกลม ไม่ใช่ทรงกระบอก" },
        { q: "เส้น Miter line เอียง 45 องศา วางไว้ที่มุมใดของภาพฉาย", options: ["บน-ซ้าย", "บน-ขวา (เหนือภาพข้าง)", "ล่าง-ซ้าย", "ล่าง-ขวา"], correct: 1, note: "วางในพื้นที่ระหว่างภาพบนและภาพข้าง เพื่อหักเหเส้นถ่ายระยะความลึก" },
        { q: "ชิ้นส่วนใดที่ 'ต้อง' เขียนลายตัด (Sectioning)", options: ["ลูกปืนเม็ดกลม", "ก้านสูบ", "เฟืองชิ้นใหญ่ที่ถูกผ่ากลาง", "ลิ่ม (Key)"], correct: 2, note: "ชิ้นงานที่มีเนื้อวัสดุมากและเป็นส่วนโครงสร้างหลักต้องเขียนลายตัดเมื่อถูกตัดผ่าน" },
        { q: "การเขียนเส้นตรงด้วยมือเปล่า ข้อใดถูกต้องที่สุดตามเฉลยสภาวิศวกร", options: ["ลากยาวครั้งเดียว", "ลากเป็นเส้นสั้นๆ ต่อกัน", "ใช้กระดาษรองมือ", "ลากแบบร่างจางๆ ก่อน"], correct: 1, note: "การลากเส้นสั้นๆ ต่อกันช่วยให้วิศวกรควบคุมความตรงได้ดีที่สุดขณะสเก็ต" },

        // หมวด 5: ขั้นสูง (ข้อ 61-80)
        { q: "ภาพ Cabinet Oblique จะเห็นความลึกเท่าใดของความจริง", options: ["เท่าจริง", "ครึ่งหนึ่ง", "สองเท่า", "สามเท่า"], correct: 1, note: "Cabinet Oblique ย่อความลึกลงครึ่งหนึ่ง (1:2) เพื่อให้ภาพสามมิติดูไม่หลอกตา" },

    let current = 0;
    let score = 0;
    let answered = new Array(rawQuestions.length).fill(null);
    let allQuestions = [];

    // ฟังก์ชันสลับลำดับช้อยส์แต่รักษาเฉลยให้ถูกตำแหน่ง
    function shuffleOptions() {
        allQuestions = rawQuestions.map(item => {
            const optionsWithMeta = item.options.map((opt, index) => ({
                text: opt,
                isCorrect: index === item.correct
            }));
            
            for (let i = optionsWithMeta.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [optionsWithMeta[i], optionsWithMeta[j]] = [optionsWithMeta[j], optionsWithMeta[i]];
            }

            return {
                q: item.q,
                options: optionsWithMeta.map(o => o.text),
                correct: optionsWithMeta.findIndex(o => o.isCorrect),
                note: item.note
            };
        });
    }

    function render() {
        const q = allQuestions[current];
        document.getElementById('q-count').innerText = `ข้อที่ ${current + 1} / ${allQuestions.length}`;
        document.getElementById('score-count').innerText = `คะแนน: ${score}`;
        document.getElementById('question-text').innerText = q.q;
        document.getElementById('progress-fill').style.width = ((current + 1) / allQuestions.length * 100) + '%';
        
        const container = document.getElementById('options-container');
        const exp = document.getElementById('explanation');
        container.innerHTML = '';
        exp.style.display = 'none';

        q.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;

            if (answered[current] !== null) {
                btn.classList.add('disabled');
                if (i === q.correct) btn.classList.add('correct');
                if (i === answered[current] && i !== q.correct) btn.classList.add('wrong');
                
                exp.style.display = 'block';
                exp.innerHTML = `<strong>คำอธิบายเฉลย:</strong> ${q.note}`;
            }

            btn.onclick = () => {
                if (answered[current] === null) {
                    answered[current] = i;
                    if (i === q.correct) score++;
                    render();
                }
            };
            container.appendChild(btn);
        });

        document.getElementById('prev-btn').disabled = current === 0;
        document.getElementById('next-btn').innerText = current === allQuestions.length - 1 ? 'ดูคะแนนสรุป' : 'ถัดไป';
    }

    function changeQ(step) {
        if (current + step >= 0 && current + step < allQuestions.length) {
            current += step;
            render();
        } else if (current + step === allQuestions.length) {
            alert("จบการทดสอบแล้ว! คะแนนรวมของคุณคือ: " + score + " / " + allQuestions.length);
        }
    }

    shuffleOptions();
    render();
</script>
